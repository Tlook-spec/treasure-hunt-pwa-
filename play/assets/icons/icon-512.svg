<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="goldGrad512" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- 背景：蓝色圆角正方形 -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad512)"/>

  <!-- 宝箱：箱身 -->
  <rect x="116" y="262" width="280" height="154" rx="26" fill="url(#goldGrad512)"/>

  <!-- 宝箱：箱盖 -->
  <path d="M 116 262 Q 116 158 256 158 Q 396 158 396 262 Z" fill="#FFD600"/>
  <!-- 箱盖纹理 -->
  <path d="M 136 240 Q 136 182 256 182 Q 376 182 376 240" fill="none" stroke="#FF8F00" stroke-width="6" opacity="0.5"/>

  <!-- 中间铰链 -->
  <rect x="116" y="250" width="280" height="22" rx="6" fill="#E65100"/>

  <!-- 锁扣 -->
  <rect x="214" y="234" width="84" height="68" rx="14" fill="#BF360C"/>
  <!-- 锁孔 -->
  <circle cx="256" cy="275" r="22" fill="#FF8F00"/>
  <circle cx="256" cy="275" r="11" fill="#E65100"/>

  <!-- 星星装饰 -->
  <circle cx="152" cy="208" r="10" fill="#FFF9C4" opacity="0.9"/>
  <circle cx="356" cy="196" r="8"  fill="#FFF9C4" opacity="0.8"/>
  <circle cx="316" cy="166" r="13" fill="#FFD600"  opacity="0.7"/>
  <circle cx="196" cy="170" r="8"  fill="#FFF9C4"  opacity="0.75"/>
  <circle cx="340" cy="228" r="6"  fill="#FFF9C4"  opacity="0.65"/>
  <circle cx="172" cy="240" r="5"  fill="#FFD600"  opacity="0.7"/>

  <!-- 底部文字 -->
  <text
    x="256" y="462"
    font-size="48"
    font-weight="700"
    text-anchor="middle"
    fill="rgba(255,255,255,0.92)"
    font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"
  >寻宝游戏</text>
</svg>
