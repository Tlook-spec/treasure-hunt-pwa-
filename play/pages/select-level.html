<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F4EAD5">
  <link rel="stylesheet" href="../styles/main.css">
  <title>选择探险 - 寻宝游戏</title>
  <!-- CDN 库（普通 script，必须在 type="module" 之前）-->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
</head>
<body>

  <!-- 顶部返回栏 -->
  <header class="page-header">
    <a href="../index.html" class="btn-back">← 返回</a>
    <h1 class="page-title">选择探险</h1>
  </header>

  <!-- ====== 续玩横幅（有未完成游戏时 JS 显示）====== -->
  <div id="resume-banner" class="resume-banner" style="display:none">
    <div class="resume-banner-text">
      <span class="resume-banner-title" id="resume-title">⏯ 继续上次的探险？</span>
      <span class="resume-banner-sub"   id="resume-sub"></span>
    </div>
    <div class="resume-banner-actions">
      <button class="btn-resume-continue" id="btn-resume-continue">继续</button>
      <button class="btn-resume-abandon"  id="btn-resume-abandon">放弃</button>
    </div>
  </div>

  <!-- 主内容 -->
  <main class="page-content">
    <!-- 探险数量标签（JS 填入）-->
    <p class="section-label" id="level-count-label">正在加载…</p>
    <!-- 探险卡片列表 / 空状态（JS 填入）-->
    <div id="level-list"></div>
  </main>

  <!-- Eruda 调试 -->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- ES Module：加载 db 并渲染探险列表 -->
  <script type="module">
    import db from '../../shared/db/play-db.js';

    // 轮换图标，按探险 ID 哈希分配（与 start-level.html 的 pickIcon 完全一致，
    // 保证同一探险在「选择列表」和「开始页」显示同一个图标，不随排序变化）
    const ICONS = ['🗺️', '🌲', '🔍', '🏆', '⭐', '🎯', '🧩', '🏃'];
    function pickIcon(id) {
      let hash = 0;
      for (const ch of String(id)) hash = (hash * 31 + ch.charCodeAt(0)) & 0xFFFFFFFF;
      return ICONS[Math.abs(hash) % ICONS.length];
    }

    async function renderLevels() {
      const levels = await db.levels.orderBy('name').toArray();
      const label  = document.getElementById('level-count-label');
      const list   = document.getElementById('level-list');

      // ====== 空状态 ======
      if (levels.length === 0) {
        label.textContent = '';
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p class="empty-title">还没有探险</p>
            <p class="empty-hint">请去电脑端编辑探险数据，<br>然后到设置页导入 JSON 文件</p>
            <a href="settings.html" class="btn-goto-settings">⚙️ 去设置页导入</a>
          </div>`;
        return;
      }

      label.textContent = `选择今天的探险吧！（${levels.length} 个）`;

      // 并行查询每个探险的点位数和最近会话
      const cards = await Promise.all(levels.map(async (level, idx) => {
        const pointCount = await db.points.where('levelId').equals(level.id).count();

        // 上次游玩时间：查该 levelId 的所有 session，取最新 startedAt
        const sessions   = await db.sessions.where('levelId').equals(level.id).toArray();
        let lastPlayText = '从未游玩';
        if (sessions.length > 0) {
          const latest = sessions.reduce((a, b) => a.startedAt > b.startedAt ? a : b);
          lastPlayText  = formatDate(latest.startedAt);
        }

        return { level, pointCount, lastPlayText, icon: pickIcon(level.id) };
      }));

      list.innerHTML = cards.map(({ level, pointCount, lastPlayText, icon }) => `
        <div class="level-card">
          <div class="level-icon">${level.coverImage
            ? `<img src="${level.coverImage}" alt="" style="width:60px;height:60px;border-radius:12px;object-fit:cover;display:block;margin:0 auto">`
            : icon}</div>
          <div class="level-body">
            <div class="level-name">${esc(level.name)}</div>
            ${level.description ? `<div class="level-desc">${esc(level.description)}</div>` : ''}
            <div class="level-meta">
              📍 ${pointCount} 个点位 &nbsp;·&nbsp; 上次游玩：${lastPlayText}
            </div>
          </div>
          <a href="start-level.html?levelId=${encodeURIComponent(level.id)}"
             class="btn-start-level">开始 ▶</a>
        </div>`).join('');
    }

    // 格式化时间戳为 YYYY-MM-DD
    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }
    function pad(n) { return String(n).padStart(2, '0'); }

    // XSS 防护：转义 HTML 特殊字符
    function esc(str) {
      return String(str).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
      );
    }

    renderLevels().catch(err => {
      console.error('[选择探险] 加载失败', err);
      document.getElementById('level-count-label').textContent = '';
      document.getElementById('level-list').innerHTML =
        '<p style="color:#FF9F89;padding:24px 0;text-align:center">加载失败，请刷新页面重试</p>';
    });

    // ====== M26 续玩横幅 ======

    async function checkResume() {
      // 查所有 in_progress 会话，取 startedAt 最新的一条
      const all = await db.sessions.where('status').equals('in_progress').toArray();
      if (all.length === 0) return;
      const session = all.reduce((a, b) => a.startedAt > b.startedAt ? a : b);

      // 读探险名和所有点位（计算"已到第 N 站"）
      const level     = await db.levels.get(session.levelId);
      const levelName = level ? level.name : '未知探险';
      const stationNum = (session.currentPointIndex ?? 0) + 1;

      // 填充横幅文字并显示
      document.getElementById('resume-title').textContent =
        `⏯ 继续上次的『${levelName}』？`;
      document.getElementById('resume-sub').textContent =
        `已到第 ${stationNum} 站`;
      const banner = document.getElementById('resume-banner');
      banner.style.display = 'flex';

      // 「继续」按钮：按存档状态跳到正确页面
      document.getElementById('btn-resume-continue').addEventListener('click', async () => {
        try {
          const allPoints = await db.points
            .where('levelId').equals(session.levelId)
            .sortBy('order');
          const idx = session.currentPointIndex ?? 0;
          const cp  = allPoints[idx];
          const sid = encodeURIComponent(session.id);

          if (!cp) {
            alert('存档数据异常，无法恢复，请放弃后重新开始。');
            return;
          }

          const pr = (session.pointRecords || [])[idx];
          if (!pr) {
            // 还没扫码进这一站 → 提示页
            location.href = `hint.html?sessionId=${sid}`;
          } else if (pr.questionResults.length < cp.questionIds.length) {
            // 站内题目未全部答完 → 答题页
            location.href = `quiz.html?sessionId=${sid}`;
          } else {
            // 题答完但还没拍照 → 拍照页
            location.href = `photo.html?sessionId=${sid}`;
          }
        } catch (err) {
          console.error('[续玩] 跳转失败', err);
          alert('恢复存档失败，请重试。');
        }
      });

      // 「放弃」按钮：二次确认后删除存档
      document.getElementById('btn-resume-abandon').addEventListener('click', () => {
        if (!confirm('确定放弃这次探险存档？\n存档删除后无法恢复。')) return;
        db.sessions.delete(session.id).then(() => {
          banner.style.display = 'none';
        }).catch(err => {
          console.error('[续玩] 删除存档失败', err);
          alert('删除失败，请刷新后重试。');
        });
      });
    }

    checkResume().catch(err => console.error('[续玩] 检查失败', err));
  </script>

</body>
</html>
