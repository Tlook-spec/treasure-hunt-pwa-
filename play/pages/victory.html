<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F4EAD5">
  <link rel="stylesheet" href="../styles/main.css">
  <title>通关啦！- 寻宝游戏</title>
  <style>
    /* ── 通关总结 3 格（图标在上、数字、标签）──────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 0 8px;
    }
    .stat-box {
      background: var(--color-bg-card);
      border-radius: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      padding: 16px 6px 14px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .stat-box-icon  { font-size: 26px; line-height: 1; }
    .stat-box-value {
      font-size: 22px; font-weight: 800; line-height: 1.15;
      color: var(--color-text-primary, #1a1a2e);
      word-break: break-word;
    }
    .stat-box-label { font-size: 12px; color: #999; }

    /* ── 按站成绩卡 ──────────────────────────── */
    .station-card {
      background: var(--color-bg-card);
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .station-card-header {
      display: flex;
      flex-direction: column;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      gap: 4px;
    }
    .station-card-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .station-card-title {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text-primary, #1a1a2e);
    }
    .station-card-arrow {
      font-size: 16px;
      color: #999;
    }
    .station-card-subtitle {
      font-size: 13px;
      color: #888;
      margin: 0;
      line-height: 1.4;
    }
    .station-card-body {
      padding: 0 16px 14px;
      border-top: 1px solid #f0f0f0;
    }
    .station-summary-line {
      font-size: 14px;
      color: var(--color-text-secondary, #666);
      margin: 10px 0 8px;
    }
    .station-all-correct {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-success, #27AE60);
      margin: 8px 0 2px;
    }
    /* ── 题目行（二级折叠）──────────────────────── */
    .q-item {
      border: 1px solid #eee;
      border-radius: 8px;
      margin: 8px 0 0;
      overflow: hidden;
    }
    .q-item-wrong {
      border-color: rgba(231,76,60,0.4);
      background: rgba(231,76,60,0.04);
    }
    .q-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
    }
    .q-item-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary, #1a1a2e);
      line-height: 1.4;
    }
    .q-item-score {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-success, #27AE60);
      white-space: nowrap;
    }
    .q-item-score-zero {
      color: var(--color-error, #E74C3C);
    }
    .q-item-arrow {
      font-size: 14px;
      color: #999;
    }
    .q-item-detail {
      padding: 0 12px 12px;
      border-top: 1px solid #f0f0f0;
    }
    .q-item-bust {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-error, #E74C3C);
      margin: 10px 0 6px;
    }
    .q-item-line {
      font-size: 14px;
      color: #555;
      margin: 6px 0;
      line-height: 1.5;
    }
    .q-item-score-hint {
      font-size: 13px;
      color: var(--color-text-secondary, #666);
      margin: 10px 0 4px;
      line-height: 1.5;
    }
    .q-item-explanation {
      font-size: 13px;
      color: #888;
      margin: 6px 0 0;
      line-height: 1.5;
    }
    /* ── 结局故事文字区（通关后给孩子读的大字故事）── */
    .ending-story-section {
      padding: 32px 16px;
      display: flex;
      justify-content: center;
    }
    .story-text {
      font-size: 20px;
      line-height: 1.9;
      color: var(--color-text, #1a1a2e);
      white-space: pre-wrap;   /* 保留家长填写的换行符 */
      text-align: center;
      max-width: 560px;
    }
  </style>
  <!-- Dexie 必须在 type="module" 之前加载 -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
</head>
<body>

  <!-- 撒花容器（CSS 动画，pointer-events: none，不影响点击）-->
  <div id="confetti-container" class="confetti-container"></div>

  <!-- 主内容（init 完成后才显示，避免闪烁空页）-->
  <main class="page-content has-bottom-action" id="main-content" style="display:none">

    <!-- 通关大标题 -->
    <div class="victory-hero">
      <div class="victory-trophy">🏆</div>
      <h1 class="victory-title">通关啦！</h1>
      <p class="victory-level-name" id="victory-level-name"></p>
    </div>

    <!-- 结局故事（endingStory 非空时显示，JS 控制）-->
    <div id="ending-story-section" class="ending-story-section" style="display:none">
      <p id="ending-story-text" class="story-text"></p>
    </div>

    <!-- 成绩卡：3 格独立框（图标在上、数字、标签）-->
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-box-icon">🌟</div>
        <div class="stat-box-value" id="stat-score">—</div>
        <div class="stat-box-label">总得分</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-icon">✅</div>
        <div class="stat-box-value" id="stat-correct">—</div>
        <div class="stat-box-label">答对题数</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-icon">⏱</div>
        <div class="stat-box-value" id="stat-time">—</div>
        <div class="stat-box-label">用时</div>
      </div>
    </div>

    <!-- 合影区 -->
    <div id="photo-section">
      <h3 class="photo-section-title" id="photo-section-title">📷 这次的合影</h3>
      <!-- 合影区标题下方：保存提醒横幅（有照片才显示，JS 控制）-->
      <div class="save-tip-banner" id="save-tip-banner" style="display:none">
        <span class="save-tip-icon">📌</span>
        <span>想留住这些照片？<b>长按每张图片</b> → 选「存储到照片」，就能存进相册啦！</span>
      </div>
      <!-- 有照片时：横向滚动 -->
      <div class="photo-gallery">
        <div class="photo-gallery-scroll" id="photo-gallery-scroll"></div>
      </div>
      <!-- 没有照片时 -->
      <div id="photo-empty" style="display:none" class="photo-empty-tip">
        这次没有拍合影哦，下次记得拍！📸
      </div>
    </div>

    <!-- 按站成绩 + 错题本 -->
    <div id="station-cards-section" style="margin-top:24px">
      <h3 class="photo-section-title">📋 按站成绩</h3>
      <div id="station-cards-list"></div>
    </div>

    <!-- V1-18 成就海报 -->
    <div id="poster-section" style="margin-top:28px; padding-bottom:4px;">
      <button class="btn-primary" id="btn-gen-poster">🎁 生成成就海报</button>
      <p id="poster-status"
         style="display:none; text-align:center; padding:16px 0; color:#888; font-size:16px;"></p>
      <div id="poster-result" style="display:none; margin-top:12px;">
        <img id="poster-img" alt="成就海报"
             style="width:100%; border-radius:12px; cursor:pointer; display:block;">
        <p style="text-align:center; margin:10px 0 0; color:#888; font-size:14px;">
          👆 长按图片保存到相册
        </p>
      </div>
    </div>

  </main>

  <!-- 返回首页（fixed bottom，init 完成后显示）-->
  <div class="bottom-action" id="bottom-action" style="display:none">
    <a href="../index.html" class="btn-primary btn-warning">🏠 返回首页</a>
  </div>

  <!-- 兜底：数据加载失败 -->
  <div id="error-state" style="display:none; padding:48px 24px; text-align:center;
       color:var(--color-error); font-size:17px; line-height:2">
    数据加载失败 😵<br>
    <a href="../index.html" style="color:var(--color-primary); font-weight:700">
      ← 返回首页
    </a>
  </div>

  <!-- Eruda 调试（?debug=1 时加载）-->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <script type="module">
    import db from '../../shared/db/play-db.js';
    import { computeStationSummaries } from '../scripts/quiz-logic.js';

    const sessionId = new URLSearchParams(location.search).get('sessionId');
    if (!sessionId) { location.href = '../index.html'; }

    // ── V1-18 海报数据（init 完成后填充，点按钮时使用）──────
    let _posterLevel     = null;
    let _posterPoints    = [];
    let _posterSummaries = [];
    let _posterPhotos    = [];
    let _posterStats     = null;

    // ── 通关音效 ─────────────────────────────────────────────
    // iOS 不允许跨页面继承音频解锁状态，进通关页属于新 document，
    // 自动播放大概率被拦 → .catch 静默吞掉。
    // 方案：先尝试自动播；同时挂一次性 pointerdown/touchstart，
    // 若自动播失败（catch 重置标志）则孩子首次碰屏时补播一次。
    const victorySound = new Audio('../assets/sounds/victory.mp3');
    let victoryTriggered = false;

    function playVictoryOnce() {
      if (victoryTriggered) return;
      victoryTriggered = true;
      victorySound.currentTime = 0;
      victorySound.play().catch(() => {
        victoryTriggered = false; // 自动播被拦，等待首次用户触摸补播
      });
    }

    // 首次用户触摸兜底（iOS 场景）
    document.addEventListener('pointerdown', playVictoryOnce, { once: true });
    document.addEventListener('touchstart',  playVictoryOnce, { once: true });

    // ── 初始化入口 ───────────────────────────────────────────
    async function init() {
      try {
        // ① 读 session
        let session = await db.sessions.get(sessionId);
        if (!session) { location.href = '../index.html'; return; }

        // ② 结算（幂等：只在尚未 completed 时写一次；刷新页面不改变 endedAt）
        if (session.status !== 'completed') {
          const endedAt = Date.now();
          await db.sessions.update(sessionId, { status: 'completed', endedAt });
          session = { ...session, status: 'completed', endedAt };
        }

        // ③ 读探险名 + 结局故事
        const level     = await db.levels.get(session.levelId);
        const levelName = level ? level.name : '精彩探险';
        document.getElementById('victory-level-name').textContent = levelName;

        // 结局故事（非空才显示）
        const endingStory = level ? (level.endingStory || '') : '';
        if (endingStory) {
          document.getElementById('ending-story-text').textContent = endingStory;
          document.getElementById('ending-story-section').style.display = 'block';
        }

        // ④ 计算成绩（遍历全部站、全部题）
        const pointRecords   = session.pointRecords || [];
        let totalScore       = 0;
        let totalQuestions   = 0;
        let correctQuestions = 0;

        for (const pr of pointRecords) {
          for (const qr of (pr.questionResults || [])) {
            totalScore += qr.score || 0;
            totalQuestions++;
            if ((qr.score || 0) > 0) correctQuestions++;
          }
        }

        // ⑤ 用时（用结算后的 endedAt，不用读进来时可能为 null 的原始值）
        // V1-21：扣掉累计暂停时长 pausedMs（老存档无此字段 → 当 0）
        const elapsed  = session.endedAt - session.startedAt - (session.pausedMs || 0);
        const totalSec = Math.max(0, Math.floor(elapsed / 1000));
        const mins     = Math.floor(totalSec / 60);
        const secs     = totalSec % 60;
        const timeStr  = mins > 0 ? `${mins} 分 ${secs} 秒` : `${secs} 秒`;

        document.getElementById('stat-score').textContent   = `${totalScore}`;
        document.getElementById('stat-correct').textContent = `${correctQuestions}/${totalQuestions}`;
        document.getElementById('stat-time').textContent    = timeStr;

        // ⑥ 合影
        await renderPhotos(session, pointRecords);

        // ⑦ 按站成绩 + 错题本
        await renderStationCards(session, pointRecords);

        // ⑧ 预取海报数据（复用 V1-02 computeStationSummaries；前面已查 DB，这里二次查缓存快）
        _posterLevel = level;
        _posterStats = { totalScore, totalQuestions, correctQuestions, timeStr, levelName };
        {
          const pts  = await db.points.where('levelId').equals(session.levelId).sortBy('order');
          const pMap = Object.fromEntries(pts.map(p => [p.id, p]));
          const qids = new Set();
          for (const pr of pointRecords)
            for (const qr of (pr.questionResults || [])) qids.add(qr.questionId);
          const qs = await db.questions.bulkGet([...qids]);
          const qMap = {};
          qs.forEach(q => { if (q) qMap[q.id] = q; });
          _posterPoints    = pts;
          _posterSummaries = computeStationSummaries(pointRecords, qMap, pMap);
          const phoEnt = pointRecords
            .map((pr, i) => ({
              stationNum: i + 1,
              pointName:  pMap[pr.pointId]?.name || `第 ${i + 1} 站`,
              photoId:    pr.completionPhotoId,
            }))
            .filter(x => x.photoId);
          const blobs = await db.photos.bulkGet(phoEnt.map(x => x.photoId));
          _posterPhotos = phoEnt
            .map((e, i) => ({ stationNum: e.stationNum, pointName: e.pointName, blob: blobs[i]?.blob || null }))
            .filter(x => x.blob);
        }

        // ⑨ 显示页面 + 按钮
        document.getElementById('main-content').style.display  = 'block';
        document.getElementById('bottom-action').style.display = 'block';

        // ⑩ 撒花 + 通关音效！
        launchConfetti();
        playVictoryOnce(); // 桌面直接响；iOS 被拦时等首次触摸补播

      } catch (err) {
        console.error('[通关页] 初始化失败', err);
        showError();
      }
    }

    // ── 按站成绩 + 错题本 ────────────────────────────────────
    async function renderStationCards(session, pointRecords) {
      // 拉取所有点位 + 所有题目（复用 DB，不另起事务）
      const allPoints = await db.points.where('levelId').equals(session.levelId).toArray();
      const pointsMap = Object.fromEntries(allPoints.map(p => [p.id, p]));

      // 收集本局用到的 questionId（去重）
      const qidSet = new Set();
      for (const pr of pointRecords) {
        for (const qr of (pr.questionResults || [])) qidSet.add(qr.questionId);
      }
      const questions = await db.questions.bulkGet([...qidSet]);
      const questionsMap = {};
      questions.forEach(q => { if (q) questionsMap[q.id] = q; });

      const summaries = computeStationSummaries(pointRecords, questionsMap, pointsMap);
      const list = document.getElementById('station-cards-list');
      for (const summary of summaries) {
        list.appendChild(buildStationCard(summary));
      }
    }

    function buildStationCard(summary) {
      const { stationNumber, pointName, totalScore, totalQuestions, correctCount, items } = summary;
      const allCorrect = correctCount === totalQuestions;

      const card = document.createElement('div');
      card.className = 'station-card';

      // 标题栏（可点击折叠）
      const header = document.createElement('div');
      header.className = 'station-card-header';

      // 顶行：站名 + 箭头
      const topRow = document.createElement('div');
      topRow.className = 'station-card-top-row';
      const titleEl = document.createElement('span');
      titleEl.className = 'station-card-title';
      titleEl.textContent = `第 ${stationNumber} 站 · ${pointName}`;
      const arrow = document.createElement('span');
      arrow.className = 'station-card-arrow';
      topRow.appendChild(titleEl);
      topRow.appendChild(arrow);

      // 副行：折叠时摘要（展开后去掉「点击查看」提示）
      const subtitleCollapsed = `${totalScore} 分 · 答对 ${correctCount}/${totalQuestions} 道题 · 点击查看详情吧`;
      const subtitleExpanded  = `${totalScore} 分 · 答对 ${correctCount}/${totalQuestions} 道题`;
      const subtitle = document.createElement('p');
      subtitle.className = 'station-card-subtitle';
      subtitle.textContent = subtitleCollapsed;

      header.appendChild(topRow);
      header.appendChild(subtitle);

      // 内容区
      const body = document.createElement('div');
      body.className = 'station-card-body';
      const summaryLine = document.createElement('p');
      summaryLine.className = 'station-summary-line';
      summaryLine.textContent = `共 ${totalQuestions} 题，答对 ${correctCount} 题`;
      body.appendChild(summaryLine);

      // 全对时给一句鼓励，再照常逐题列出
      if (allCorrect) {
        const allGood = document.createElement('p');
        allGood.className = 'station-all-correct';
        allGood.textContent = '这站全对，厉害！🌟';
        body.appendChild(allGood);
      }

      // 逐题列出（含得分），每题可二级展开，0 分题默认展开
      for (const { qr, question } of items) {
        body.appendChild(buildQuestionRow(qr, question));
      }

      // 全部默认折叠
      body.style.display = 'none';
      arrow.textContent = '▸';

      header.addEventListener('click', () => {
        const open = body.style.display !== 'none';
        body.style.display = open ? 'none' : 'block';
        arrow.textContent = open ? '▸' : '▾';
        subtitle.textContent = open ? subtitleCollapsed : subtitleExpanded;
      });

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    // 单题行：题干 + 得分（0 分标红），点击展开看错误答案/正确答案/解析
    function buildQuestionRow(qr, question) {
      const isZero = (qr.score || 0) === 0;

      const item = document.createElement('div');
      item.className = isZero ? 'q-item q-item-wrong' : 'q-item';

      // 头部：题干 + 得分 + 箭头（可点击）
      const head = document.createElement('div');
      head.className = 'q-item-header';
      const titleEl = document.createElement('span');
      titleEl.className = 'q-item-title';
      titleEl.textContent = question ? question.text : '（题目数据不存在）';
      const scoreEl = document.createElement('span');
      scoreEl.className = isZero ? 'q-item-score q-item-score-zero' : 'q-item-score';
      scoreEl.textContent = `${qr.score || 0} 分`;
      const arrow = document.createElement('span');
      arrow.className = 'q-item-arrow';
      head.appendChild(titleEl);
      head.appendChild(scoreEl);
      head.appendChild(arrow);

      // 详情区
      const detail = document.createElement('div');
      detail.className = 'q-item-detail';
      buildQuestionDetail(detail, qr, question);

      // 0 分题默认展开，其余默认折叠
      const open = isZero;
      detail.style.display = open ? 'block' : 'none';
      arrow.textContent = open ? '▾' : '▸';
      head.addEventListener('click', () => {
        const nowOpen = detail.style.display !== 'none';
        detail.style.display = nowOpen ? 'none' : 'block';
        arrow.textContent = nowOpen ? '▸' : '▾';
      });

      item.appendChild(head);
      item.appendChild(detail);
      return item;
    }

    // 把 wrongChoices 字母数组转成「A. 选项文字」列表，供各分支复用
    function formatWrongChoices(choices, question) {
      return choices.map(letter => {
        const idx = 'ABCD'.indexOf(letter);
        const optText = (question && question.options && idx >= 0) ? question.options[idx] : '';
        return optText ? `${letter}. ${optText}` : letter;
      });
    }

    // 填充单题详情：得分说明 + 错误答案（嵌入说明句）+ 正确答案 + 解析
    function buildQuestionDetail(detail, qr, question) {
      const score = qr.score || 0;
      const choices = qr.wrongChoices || [];

      // ① 得分说明（每种分值一句自然语言）
      const hint = document.createElement('p');
      hint.className = score === 0 ? 'q-item-bust' : 'q-item-score-hint';

      if (score === 0) {
        hint.textContent = '这题没答出来，直接看了答案';
      } else if (score === 3) {
        hint.textContent = '本题求助了爸爸妈妈，所以是 3 分';
      } else if (score === 5) {
        if (choices.length > 0 && question) {
          const wrongTexts = formatWrongChoices(choices, question);
          hint.textContent = `这道题一开始答错了 ${wrongTexts.join('、')}，所以是 5 分`;
        } else {
          hint.textContent = '这道题答错后答对了，所以是 5 分';
        }
      } else {
        // score === 10：一次答对，不加说明行
        hint.style.display = 'none';
      }
      detail.appendChild(hint);

      if (!question) return;

      // ② 0 分时单独列选错答案（5/3 分已嵌入说明句，不重复）
      if (score === 0 && choices.length > 0) {
        const wrongTexts = formatWrongChoices(choices, question);
        const wrongLine = document.createElement('p');
        wrongLine.className = 'q-item-line';
        wrongLine.textContent = `❌ 选错：${wrongTexts.join('、')}`;
        detail.appendChild(wrongLine);
      }

      // ③ 正确答案
      const correctLetter = String(question.correctAnswer || '').trim().toUpperCase();
      const correctIdx = 'ABCD'.indexOf(correctLetter);
      const correctOptText = (question.options && correctIdx >= 0) ? question.options[correctIdx] : '';
      const correctLine = document.createElement('p');
      correctLine.className = 'q-item-line';
      correctLine.textContent = correctOptText
        ? `✅ 正确答案：${correctLetter}. ${correctOptText}`
        : `✅ 正确答案：${correctLetter}`;
      detail.appendChild(correctLine);

      // ④ 解析（非空才显示）
      if (question.explanation) {
        const expLine = document.createElement('p');
        expLine.className = 'q-item-explanation';
        expLine.textContent = `📖 解析：${question.explanation}`;
        detail.appendChild(expLine);
      }
    }

    // ── 合影渲染 ─────────────────────────────────────────────
    async function renderPhotos(session, pointRecords) {
      // 收集有合影的 pointRecord（保留原始下标作站号）
      const photoEntries = pointRecords
        .map((pr, i) => ({ stationNum: i + 1, pointId: pr.pointId, photoId: pr.completionPhotoId }))
        .filter((x) => x.photoId != null);

      if (photoEntries.length === 0) {
        document.getElementById('photo-gallery-scroll').style.display = 'none';
        document.getElementById('photo-empty').style.display = 'block';
        return;
      }

      // 一次性读取所有 photo blob + 所有点位名
      const [photos, allPoints] = await Promise.all([
        db.photos.bulkGet(photoEntries.map((x) => x.photoId)),
        db.points.where('levelId').equals(session.levelId).toArray(),
      ]);
      const pointMap = Object.fromEntries(allPoints.map((p) => [p.id, p]));

      const scroll  = document.getElementById('photo-gallery-scroll');
      let rendered  = 0;

      photos.forEach((photo, i) => {
        if (!photo || !photo.blob) return; // 容错：photo 记录丢失时跳过

        const { stationNum, pointId } = photoEntries[i];
        const pointName = pointMap[pointId]?.name || `第 ${stationNum} 站`;

        const thumb = document.createElement('div');
        thumb.className = 'photo-thumb';

        const img = document.createElement('img');
        img.src       = URL.createObjectURL(photo.blob);
        img.className = 'photo-thumb-img';
        img.alt       = `第 ${stationNum} 站合影`;
        img.addEventListener('click', () => openFullscreen(img.src));

        const caption = document.createElement('p');
        caption.className   = 'photo-thumb-caption';
        caption.textContent = `第 ${stationNum} 站 · ${pointName}`;

        thumb.appendChild(img);
        thumb.appendChild(caption);
        scroll.appendChild(thumb);
        rendered++;
      });

      if (rendered === 0) {
        scroll.style.display = 'none';
        document.getElementById('photo-empty').style.display = 'block';
      } else {
        document.getElementById('photo-section-title').textContent =
          `📷 这次的合影（${rendered} 张）`;
        document.getElementById('save-tip-banner').style.display = 'flex';
      }
    }

    // ── 全屏查看 ─────────────────────────────────────────────
    function openFullscreen(src) {
      const overlay = document.createElement('div');
      overlay.style.cssText = [
        'position:fixed', 'inset:0', 'background:rgba(0,0,0,0.92)',
        'display:flex', 'flex-direction:column', 'align-items:center',
        'justify-content:center', 'z-index:1000', 'padding:16px',
      ].join(';');

      const img = document.createElement('img');
      img.src            = src;
      img.style.cssText  = 'max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px;';

      const hint = document.createElement('p');
      hint.textContent   = '👆 长按这张图片，选「存储到照片」即可保存';
      hint.style.cssText = [
        'margin-top:18px', 'padding:12px 22px',
        'background:rgba(255,255,255,0.18)', 'color:#fff',
        'font-size:16px', 'font-weight:600', 'text-align:center',
        'border-radius:999px', 'animation:saveHintPulse 1.6s ease-in-out infinite',
      ].join(';');

      const closeTip = document.createElement('p');
      closeTip.textContent   = '点击空白处关闭';
      closeTip.style.cssText = 'color:#999;margin-top:10px;font-size:13px;';

      overlay.appendChild(img);
      overlay.appendChild(hint);
      overlay.appendChild(closeTip);
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    }

    // ── CSS emoji 撒花（无依赖库，3-5 秒后自动清理）────────────
    function launchConfetti() {
      const container = document.getElementById('confetti-container');
      const emojis    = ['🎉', '🎊', '⭐', '🌟', '✨', '🎈', '🏆', '🎀', '🌈'];
      const total     = 45;

      for (let i = 0; i < total; i++) {
        setTimeout(() => {
          const el            = document.createElement('span');
          el.className        = 'confetti-piece';
          el.textContent      = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left       = Math.random() * 100 + '%';
          el.style.fontSize   = (14 + Math.random() * 22) + 'px';
          el.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
          container.appendChild(el);
          // 动画结束后删除元素，避免 DOM 堆积
          el.addEventListener('animationend', () => el.remove(), { once: true });
        }, i * 100);
      }
    }

    // ── V1-18 成就海报：按钮事件 ─────────────────────────────
    document.getElementById('btn-gen-poster').addEventListener('click', async () => {
      const btnEl   = document.getElementById('btn-gen-poster');
      const statEl  = document.getElementById('poster-status');
      const resultEl = document.getElementById('poster-result');
      btnEl.disabled    = true;
      btnEl.textContent = '⏳ 生成中…';
      statEl.textContent  = '⏳ 生成中，请稍候…';
      statEl.style.display  = 'block';
      resultEl.style.display = 'none';

      // 先让 UI 刷新再开始 Canvas 合成
      await new Promise(r => setTimeout(r, 60));

      let ok = false;
      try {
        const dataUrl   = await _buildPosterCanvas();
        const imgEl     = document.getElementById('poster-img');
        imgEl.src       = dataUrl;
        imgEl.onclick   = () => openFullscreen(dataUrl);
        resultEl.style.display = 'block';
        resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        ok = true;
      } catch (err) {
        console.error('[海报] 生成失败', err);
        statEl.textContent   = '⚠️ 生成失败，请重试（' + err.message + '）';
        statEl.style.display = 'block';
      } finally {
        btnEl.disabled    = false;
        btnEl.textContent = '🎁 重新生成海报';
        if (ok) statEl.style.display = 'none';
      }
    });

    // ── V1-18 成就海报：Canvas 合成 ──────────────────────────
    async function _buildPosterCanvas() {
      const W    = 1080;
      const PAD  = 56;
      const CW   = W - PAD * 2;           // 可用内容宽 968
      const FONT = '-apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
      const { totalScore, totalQuestions, correctQuestions, timeStr, levelName } = _posterStats;

      // ① 加载图片资源
      let mapImg = null, MAP_W = CW, MAP_H = 0;
      if (_posterLevel && _posterLevel.mapImage) {
        try {
          mapImg = await _loadImg(_posterLevel.mapImage);
          MAP_H  = Math.round(mapImg.naturalHeight * MAP_W / mapImg.naturalWidth);
        } catch (e) { mapImg = null; }
      }

      const photoImgs = [];
      for (const p of _posterPhotos) {
        try {
          const url = URL.createObjectURL(p.blob);
          const img = await _loadImg(url);
          URL.revokeObjectURL(url);
          photoImgs.push({ img, stationNum: p.stationNum, pointName: p.pointName });
        } catch (e) { /* 跳过加载失败的照片 */ }
      }

      // ② 计算布局高度
      const PH_COLS = 2;
      const PH_GAP  = 16;
      const PH_W    = Math.floor((CW - PH_GAP) / PH_COLS); // ~476
      const PH_H    = Math.round(PH_W * 9 / 16);           // ~268 (16:9 裁剪)
      const PH_CAP  = 36;                                    // 合影标题高
      const PH_ROW  = PH_H + PH_CAP + 12;
      const PH_ROWS = Math.ceil(photoImgs.length / PH_COLS);

      const H_HDR   = 310;  // 蓝色顶部区域（标题 + 分数 + 时间）
      const H_WPT   = 28;   // 白色区上边距
      const H_STTL  = 54;   // 各节标题行高
      const H_SROW  = 52;   // 站点数据行高
      const H_DIV   = 36;   // 分隔线（含上下留白）
      const H_BOT   = 64;   // 底部留白

      let totalH = H_HDR + H_WPT;
      totalH += H_STTL + _posterSummaries.length * H_SROW + 16;
      if (photoImgs.length > 0) totalH += H_DIV + H_STTL + PH_ROWS * PH_ROW + 16;
      if (mapImg)               totalH += H_DIV + H_STTL + MAP_H + 20;
      totalH += H_BOT;

      // ③ 创建 Canvas
      const canvas   = document.createElement('canvas');
      canvas.width   = W;
      canvas.height  = totalH;
      const ctx      = canvas.getContext('2d');

      // ④ 蓝色渐变顶部区
      // 顶部区：暖白色（不再橙色渐变）
      const hGrad = ctx.createLinearGradient(0, 0, 0, H_HDR);
      hGrad.addColorStop(0, '#FFFDF6');
      hGrad.addColorStop(1, '#FBF3E2');
      ctx.fillStyle = hGrad;
      ctx.fillRect(0, 0, W, H_HDR);

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle    = '#52402D';   // 深褐字

      // 探险名（自动截断防溢出）
      ctx.font = `bold 52px ${FONT}`;
      _posterFillFit(ctx, levelName, W / 2, 76, CW);

      // "宝藏探险 · 成就海报" 副标题
      ctx.font      = `28px ${FONT}`;
      ctx.fillStyle = '#82664B';
      ctx.fillText('宝藏探险 · 成就海报', W / 2, 120);

      // 通关总结 3 格（图标在上、数字、标签）—— 与通关页一致
      const stats = [
        { icon: '🌟', value: `${totalScore}`,                       label: '总得分' },
        { icon: '✅', value: `${correctQuestions}/${totalQuestions}`, label: '答对题数' },
        { icon: '⏱', value: timeStr,                               label: '用时' },
      ];
      const boxGap = 16;
      const boxW   = (CW - boxGap * 2) / 3;
      const boxH   = 132;
      const boxY   = 150;
      stats.forEach((s, i) => {
        const bx = PAD + i * (boxW + boxGap);
        // 米色圆角框 + 淡棕描边
        ctx.fillStyle   = '#F4EAD5';
        _posterRRect(ctx, bx, boxY, boxW, boxH, 18);
        ctx.fill();
        ctx.strokeStyle = '#D9C9AE';
        ctx.lineWidth   = 1.5;
        _posterRRect(ctx, bx, boxY, boxW, boxH, 18);
        ctx.stroke();
        ctx.textAlign = 'center';
        // 图标
        ctx.font      = `40px ${FONT}`;
        ctx.fillText(s.icon, bx + boxW / 2, boxY + 52);
        // 数字（超宽自动截断）
        ctx.font      = `bold 38px ${FONT}`;
        ctx.fillStyle = '#52402D';   // 深褐字
        _posterFillFit(ctx, s.value, bx + boxW / 2, boxY + 96, boxW - 24);
        // 标签
        ctx.font      = `22px ${FONT}`;
        ctx.fillStyle = '#82664B';
        ctx.fillText(s.label, bx + boxW / 2, boxY + 122);
      });

      // ⑤ 内容区：暖米色背景
      ctx.fillStyle = '#F4EAD5';
      ctx.fillRect(0, H_HDR, W, totalH - H_HDR);

      let y = H_HDR + H_WPT;

      // ⑥ 按站成绩列表
      ctx.fillStyle = '#52402D';
      ctx.textAlign = 'left';
      ctx.font      = `bold 36px ${FONT}`;
      ctx.fillText('📋 按站成绩', PAD, y + 36);
      y += H_STTL;

      for (const s of _posterSummaries) {
        ctx.font      = `30px ${FONT}`;
        ctx.fillStyle = '#333333';
        ctx.textAlign = 'left';
        _posterFillFit(ctx, `第 ${s.stationNumber} 站 · ${s.pointName}`, PAD, y + 30, CW - 160);

        ctx.textAlign = 'right';
        ctx.font      = `bold 30px ${FONT}`;
        ctx.fillStyle = s.totalScore > 0 ? '#16A34A' : '#DC2626';
        ctx.fillText(`${s.totalScore} 分`, W - PAD, y + 30);

        ctx.strokeStyle = '#D9C9AE';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.moveTo(PAD,     y + H_SROW - 2);
        ctx.lineTo(W - PAD, y + H_SROW - 2);
        ctx.stroke();
        y += H_SROW;
      }
      y += 16;

      // ⑦ 合影拼图（无合影则跳过）
      if (photoImgs.length > 0) {
        _posterDivider(ctx, y, W, PAD);
        y += H_DIV;

        ctx.fillStyle = '#1a1a2e';
        ctx.textAlign = 'left';
        ctx.font      = `bold 36px ${FONT}`;
        ctx.fillText(`📷 通关合影（${photoImgs.length} 张）`, PAD, y + 36);
        y += H_STTL;

        for (let i = 0; i < photoImgs.length; i++) {
          const col = i % PH_COLS;
          const row = Math.floor(i / PH_COLS);
          const ix  = PAD + col * (PH_W + PH_GAP);
          const iy  = y + row * PH_ROW;
          const { img, stationNum, pointName } = photoImgs[i];

          // 按 16:9 居中裁剪
          const sr = img.naturalWidth / img.naturalHeight;
          const dr = PH_W / PH_H;
          let sx, sy, sw, sh;
          if (sr > dr) { sh = img.naturalHeight; sw = sh * dr; sx = (img.naturalWidth - sw) / 2; sy = 0; }
          else          { sw = img.naturalWidth;  sh = sw / dr; sx = 0; sy = (img.naturalHeight - sh) / 2; }

          ctx.save();
          _posterRRect(ctx, ix, iy, PH_W, PH_H, 10);
          ctx.clip();
          ctx.drawImage(img, sx, sy, sw, sh, ix, iy, PH_W, PH_H);
          ctx.restore();

          ctx.fillStyle    = '#555';
          ctx.font         = `24px ${FONT}`;
          ctx.textAlign    = 'center';
          ctx.fillText(`第 ${stationNum} 站 · ${pointName}`, ix + PH_W / 2, iy + PH_H + 26);
        }
        y += PH_ROWS * PH_ROW + 16;
      }

      // ⑧ 全亮地图（无地图则跳过）
      if (mapImg) {
        _posterDivider(ctx, y, W, PAD);
        y += H_DIV;

        ctx.fillStyle = '#1a1a2e';
        ctx.textAlign = 'left';
        ctx.font      = `bold 36px ${FONT}`;
        ctx.fillText('🗺️ 全程地图（全站通关）', PAD, y + 36);
        y += H_STTL;

        // 底图（圆角裁剪）
        ctx.save();
        _posterRRect(ctx, PAD, y, MAP_W, MAP_H, 12);
        ctx.clip();
        ctx.drawImage(mapImg, PAD, y, MAP_W, MAP_H);
        ctx.restore();

        // 所有点位：红星 + 金色站名（全部 completed 态）
        const fontSize  = ({ small: 12, medium: 15, large: 19 })[_posterLevel.mapFontSize] || 15;
        const goldColor = _posterLevel.mapNameColorCompleted || '#FFD700';
        const labelPx   = Math.max(18, Math.round(fontSize * MAP_W / 350));
        const starOuter = Math.max(12, Math.round(MAP_W / 52));
        const starInner = Math.round(starOuter * 0.42);

        for (const pt of _posterPoints) {
          if (pt.mapX == null || pt.mapY == null) continue;
          const mx = PAD + pt.mapX * MAP_W;
          const my = y   + pt.mapY * MAP_H;

          // 旋转 -15° 模拟印章感（同 map-overlay.js 的 SVG 旋转）
          ctx.save();
          ctx.translate(mx, my);
          ctx.rotate(-15 * Math.PI / 180);
          _posterStar5(ctx, 0, 0, starOuter, starInner, '#E74C3C');
          ctx.restore();

          // 站名：黑色阴影 + 金色文字
          ctx.save();
          ctx.font         = `bold ${labelPx}px ${FONT}`;
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'top';
          ctx.shadowColor  = 'rgba(0,0,0,0.85)';
          ctx.shadowBlur   = 5;
          ctx.fillStyle    = goldColor;
          ctx.fillText(pt.name, mx, my + starOuter + 4);
          ctx.restore();
        }
        y += MAP_H + 20;
      }

      return canvas.toDataURL('image/jpeg', 0.85);
    }

    // ── V1-18 海报辅助函数（_前缀防止与其他函数名冲突）────────

    function _loadImg(src) {
      return new Promise((resolve, reject) => {
        const img   = new Image();
        img.onload  = () => resolve(img);
        img.onerror = () => reject(new Error('图片加载失败'));
        img.src     = src;
      });
    }

    // 文字超宽时自动截断加省略号
    function _posterFillFit(ctx, text, x, y, maxW) {
      if (ctx.measureText(text).width <= maxW) { ctx.fillText(text, x, y); return; }
      let t = text;
      while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
      ctx.fillText(t + '…', x, y);
    }

    // 圆角矩形路径（用于 clip）
    function _posterRRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + r, r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.arcTo(x,     y + h, x, y + h - r, r);
      ctx.arcTo(x,     y,     x + r, y, r);
      ctx.closePath();
    }

    // 水平分隔线
    function _posterDivider(ctx, y, W, PAD) {
      ctx.strokeStyle = '#D9C9AE';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.moveTo(PAD,     y + 16);
      ctx.lineTo(W - PAD, y + 16);
      ctx.stroke();
    }

    // 五角星路径（10 顶点交替 outer/inner）
    function _posterStar5(ctx, cx, cy, outerR, innerR, color) {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const r     = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI / 5) - Math.PI / 2;
        if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
        else         ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
      }
      ctx.closePath();
      ctx.fillStyle   = color;
      ctx.fill();
      ctx.strokeStyle = '#C0392B';
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }

    // ── 错误状态 ─────────────────────────────────────────────
    function showError() {
      document.getElementById('main-content').style.display  = 'none';
      document.getElementById('bottom-action').style.display = 'none';
      document.getElementById('error-state').style.display   = 'block';
    }

    init();
  </script>
