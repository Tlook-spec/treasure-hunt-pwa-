<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0E1628">
  <title>扫码 - 寻宝游戏</title>
  <!-- 深色独立样式，不加载 main.css（深色主题与游戏主色不同）-->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      background: #0E1628;
      min-height: 100vh; min-height: 100dvh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ====== 顶部导航 ====== */
    .scan-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; min-height: 52px; flex-shrink: 0;
      background: rgba(0,0,0,0.25);
    }
    #btn-back {
      background: none; border: none; color: rgba(255,255,255,0.85);
      font-size: 16px; font-weight: 600; padding: 8px 12px; cursor: pointer;
      border-radius: 10px; min-height: 44px; min-width: 72px;
    }
    #btn-back:active { background: rgba(255,255,255,0.15); }
    .scan-title { font-size: 17px; font-weight: 700; }
    #station-label {
      font-size: 14px; color: rgba(255,255,255,0.55);
      min-width: 72px; text-align: right;
    }

    /* ====== 摄像头主区域 ====== */
    .scan-camera-section {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 24px; gap: 14px;
    }
    .camera-wrapper {
      position: relative;
      width: min(88vw, 420px);
      height: min(88vw, 420px);
      border-radius: 16px;
      overflow: hidden;
      background: #060D1C;
    }

    /* 启动状态覆盖层（默认可见，camera 激活后隐藏）*/
    #start-overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 24px;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }
    .start-icon { font-size: 60px; line-height: 1; opacity: 0.75; }
    #btn-start-scan {
      background: #4A90E2; color: #fff; border: none;
      border-radius: 14px; padding: 14px 32px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      width: 100%; max-width: 240px; min-height: 56px;
    }
    #btn-start-scan:active { background: #3A7BC8; }
    #btn-start-scan:disabled { opacity: 0.5; }

    /* 错误状态（摄像头权限被拒时显示）*/
    #error-content {
      display: none; flex-direction: column;
      align-items: center; gap: 14px; text-align: center;
    }
    .error-icon { font-size: 48px; }
    .error-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.7; }
    #btn-retry-scan {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 10px;
      padding: 10px 24px; font-size: 15px; font-weight: 600;
      cursor: pointer; min-height: 44px;
    }
    #btn-retry-scan:active { background: rgba(255,255,255,0.22); }

    /* html5-qrcode 摄像头注入目标 */
    #reader {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border-radius: 16px;
    }
    /* 强制摄像头视频填满容器（覆盖 html5-qrcode 默认内联样式）*/
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    /* 摄像头下方提示文字 */
    #scan-hint {
      font-size: 15px; color: rgba(255,255,255,0.5);
      text-align: center; line-height: 1.5;
      max-width: min(88vw, 420px);
    }

    /* ====== 底部两个备选按钮 ====== */
    .scan-footer {
      display: flex; gap: 12px;
      padding: 12px 16px 20px; flex-shrink: 0;
    }
    .btn-fallback {
      flex: 1; min-height: 56px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.80); border-radius: 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 5px; padding: 0 10px; text-align: center; line-height: 1.4;
    }
    .btn-fallback:active { background: rgba(255,255,255,0.18); }
    .btn-fallback-warn {
      border-color: rgba(245,166,35,0.4);
      color: rgba(245,194,107,0.9);
    }

    /* ====== 扫码结果覆层（错码提示，2 秒后自动消失）====== */
    #result-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .result-card {
      background: #fff; border-radius: 20px;
      padding: 28px 24px 24px;
      max-width: 340px; width: 100%;
      text-align: center;
    }
    .result-card-wrong   { background: #FFF5E6; }
    .result-card-invalid { background: #FFF0F0; }
    .result-emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .result-main  {
      font-size: 17px; font-weight: 700;
      color: #2C3E50; line-height: 1.5; margin-bottom: 8px;
    }
    .result-sub { font-size: 14px; color: #6C757D; line-height: 1.5; }
  </style>

  <!-- CDN 库（普通 script，必须在 type="module" 之前）-->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <!-- 顶部导航 -->
  <header class="scan-header">
    <button id="btn-back">← 返回</button>
    <span class="scan-title">对准二维码</span>
    <span id="station-label">…</span>
  </header>

  <!-- 摄像头主区域 -->
  <div class="scan-camera-section">
    <div class="camera-wrapper">

      <!-- 启动覆盖层：idle（点击启动）或 error（权限被拒）-->
      <div id="start-overlay">
        <!-- 默认 idle：大图标 + 开始按钮 -->
        <div id="idle-content"
             style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%">
          <div class="start-icon">📷</div>
          <button id="btn-start-scan">点击开始扫码</button>
        </div>
        <!-- 错误：权限被拒 / 摄像头不可用 -->
        <div id="error-content">
          <div class="error-icon">⚠️</div>
          <p class="error-text" id="error-msg"></p>
          <button id="btn-retry-scan">再试一次</button>
        </div>
      </div>

      <!-- html5-qrcode 摄像头注入区（lib 会把 video 放进这里）-->
      <div id="reader"></div>
    </div>

    <p id="scan-hint">把二维码放进框里就行啦～</p>
  </div>

  <!-- 底部备选按钮（弹窗在 M21 实现）-->
  <div class="scan-footer">
    <button class="btn-fallback" id="btn-manual-input">
      ⌨️ 扫不出？<br>可以输入数字码
    </button>
    <button class="btn-fallback btn-fallback-warn" id="btn-cant-find">
      ❓ 找不到<br>二维码？
    </button>
  </div>

  <!-- 扫码结果覆层（扫到错码时弹出，2 秒后自动消失）-->
  <div id="result-overlay" style="display:none">
    <div id="result-card" class="result-card">
      <span id="result-emoji" class="result-emoji"></span>
      <p id="result-main" class="result-main"></p>
      <p id="result-sub" class="result-sub"></p>
    </div>
  </div>

  <!-- Eruda 调试（?debug=1 时加载）-->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- ES Module：扫码主逻辑 -->
  <script type="module">
    import db from '../../shared/db/play-db.js';
    import { verifyCode } from '../scripts/scan-verify.js';

    // ── 初始化 ──────────────────────────────────────────
    const params    = new URLSearchParams(location.search);
    const sessionId = params.get('sessionId');
    if (!sessionId) { location.href = 'select-level.html'; }

    let html5Qr    = null;  // html5-qrcode 实例（每次启动重建）
    let isScanning  = false; // 摄像头是否正在运行
    let isVerifying = false; // 正在验证扫码结果（防止重复处理）

    const startOverlay = document.getElementById('start-overlay');
    const idleContent  = document.getElementById('idle-content');
    const errorContent = document.getElementById('error-content');

    // ── 加载站点编号显示 ──
    async function loadStation() {
      const session = await db.sessions.get(sessionId);
      if (!session) { location.href = 'select-level.html'; return; }
      document.getElementById('station-label').textContent =
        `第 ${session.currentPointIndex + 1} 站`;
    }

    // ── 状态：idle（点击启动）──
    function showIdleState() {
      idleContent.style.display  = 'flex';
      errorContent.style.display = 'none';
      startOverlay.style.display = 'flex';
      document.getElementById('btn-start-scan').disabled = false;
      const hint = document.getElementById('scan-hint');
      hint.textContent = '把二维码放进框里就行啦～';
      hint.style.color = '';
    }

    // ── 状态：摄像头权限错误 ──
    function showCameraError(msg) {
      idleContent.style.display  = 'none';
      errorContent.style.display = 'flex';
      document.getElementById('error-msg').innerHTML = msg;
      startOverlay.style.display = 'flex';
    }

    // ── 启动摄像头 ──
    async function startScan() {
      if (isScanning || isVerifying) return;

      // 每次启动前清空 #reader 并重建实例（保证重试状态干净）
      document.getElementById('reader').innerHTML = '';
      html5Qr = new Html5Qrcode('reader'); // Html5Qrcode 来自 CDN 全局变量

      // 隐藏启动层，让 #reader 完整显示
      startOverlay.style.display = 'none';

      try {
        await html5Qr.start(
          { facingMode: 'environment' },        // 后置摄像头
          { fps: 10, qrbox: { width: 260, height: 260 } },
          handleScanResult,                     // 识别成功回调
          () => {}                              // 每帧未识别 QR，忽略
        );
        isScanning = true;
      } catch (err) {
        console.error('[扫码] 摄像头启动失败', err);
        showCameraError(
          '摄像头启动失败<br>' +
          '请在 iPad「设置 → Safari → 相机」选「允许」<br><br>' +
          '也可以点下方「输入数字码」'
        );
      }
    }

    // ── 停止摄像头 ──
    async function stopCamera() {
      if (!isScanning || !html5Qr) return;
      try {
        await html5Qr.stop();
      } catch (e) {
        console.warn('[扫码] 停止摄像头时出错', e);
      }
      isScanning = false;
    }

    // ── 扫到 QR 后的处理流程 ──
    async function handleScanResult(decodedText) {
      if (isVerifying) return; // 防止同一帧多次触发
      isVerifying = true;

      await stopCamera();

      const code = decodedText.trim();
      console.log('[扫码] 识别内容：', code);

      try {
        const res = await verifyCode(code, sessionId);

        if (res.result === 'correct') {
          // 叮咚音效（M23 放音频文件，现在占位，失败不报错）
          new Audio('../assets/sounds/ding.mp3').play().catch(() => {});
          // 跳转本站开始挑战页（M22 实现，现在会 404）
          location.href = `challenge.html?sessionId=${encodeURIComponent(sessionId)}`;
          return; // 导航中，不走 finally

        } else if (res.result === 'wrong_station') {
          showResultCard('wrong',
            '这不是你现在要找的点哦！',
            `现在要找第 ${res.stationNum} 站，再看看提示～`
          );
        } else if (res.result === 'invalid') {
          showResultCard('invalid',
            '这不是寻宝游戏的码哦',
            '可能是别的二维码不小心扫到了～'
          );
        } else {
          // result === 'error'
          showResultCard('invalid', '出现了一个错误', res.message || '请重试');
        }

      } catch (err) {
        console.error('[扫码] 验证失败', err);
        showResultCard('invalid', '验证时出错了', '请重试一次');
      } finally {
        isVerifying = false;
      }
    }

    // ── 显示错误码结果卡片，2 秒后自动回到 idle ──
    function showResultCard(type, main, sub) {
      document.getElementById('result-emoji').textContent = type === 'wrong' ? '🤔' : '❓';
      document.getElementById('result-main').textContent  = main;
      document.getElementById('result-sub').textContent   = sub;
      document.getElementById('result-card').className =
        type === 'wrong' ? 'result-card result-card-wrong' : 'result-card result-card-invalid';
      document.getElementById('result-overlay').style.display = 'flex';

      setTimeout(() => {
        document.getElementById('result-overlay').style.display = 'none';
        showIdleState();
      }, 2000);
    }

    // ── 按钮事件绑定 ────────────────────────────────────

    // 返回提示页（先停摄像头再跳转）
    document.getElementById('btn-back').addEventListener('click', async () => {
      await stopCamera();
      location.href = `hint.html?sessionId=${encodeURIComponent(sessionId)}`;
    });

    // 点击「开始扫码」
    document.getElementById('btn-start-scan').addEventListener('click', startScan);

    // 权限被拒后「再试一次」
    document.getElementById('btn-retry-scan').addEventListener('click', () => {
      showIdleState();
      startScan();
    });

    // M21 占位：底部两个备选按钮（弹窗逻辑 M21 实现）
    document.getElementById('btn-manual-input').addEventListener('click', () => {
      console.log('[扫码] M21 占位：数字码输入弹窗');
    });
    document.getElementById('btn-cant-find').addEventListener('click', () => {
      console.log('[扫码] M21 占位：找不到二维码弹窗');
    });

    // ── 切后台处理（避免 iOS Safari 摄像头黑屏）──
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'hidden') {
        // 切到后台：立即停摄像头，回来后必须手动重启（防黑屏）
        await stopCamera();
      } else if (!isScanning && !isVerifying) {
        // 回到前台且摄像头已停：恢复「点击开始扫码」状态
        showIdleState();
      }
    });

    // ── 页面初始化 ──
    loadStation().catch(err => console.error('[扫码] 加载站点信息失败', err));
  </script>

</body>
</html>
