<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90E2">
  <link rel="stylesheet" href="../styles/main.css">
  <title>答题 - 寻宝游戏</title>
  <!-- Dexie 必须在 type="module" 脚本之前加载 -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <!-- pinyin-pro：拼音标注（全局名 pinyinPro） -->
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.2/dist/index.js"></script>
  <style>
    /* 拼音 ruby 标注：字号小、颜色淡，不抢眼 */
    ruby { ruby-align: center; }
    rt   { font-size: 0.52em; color: #aaa; line-height: 1.2; }
  </style>
</head>
<body>

  <!-- ── 顶部进度横幅（屏 1 专用）──────────────────────────── -->
  <div class="station-banner" id="quiz-banner">
    <div id="banner-discovery" style="display:flex; align-items:center; gap:8px; width:100%">
      <div class="station-banner-dot"></div>
      <span id="discovery-station-text">加载中…</span>
    </div>
  </div>

  <!-- ── 屏 1：发现站点（发现文案 + 内联地图，有其一就显示）── -->
  <div id="screen-discovery" style="display:none">
    <main class="page-content has-bottom-action">
      <!-- 发现文案（discoveryText 非空时显示，默认隐藏）-->
      <div class="discovery-card" id="discovery-text-section" style="display:none">
        <div class="discovery-card-icon">💡</div>
        <p class="discovery-card-text" id="discovery-text"></p>
      </div>
      <!-- 答题引导文案（questionIntroText 非空时显示在文案下方，合并到同一页）-->
      <p id="intro-text"
         style="display:none; padding:4px 16px 0; color:#555; font-size:17px;
                line-height:1.8; white-space:pre-wrap; text-align:center;"></p>
      <!-- 内联地图（有 mapImage 时渲染，高度随图片比例自适应，不写死高度）-->
      <div id="discovery-map-container"
           style="display:none; margin:12px 0 0; border-radius:12px; overflow:hidden;
                  background:transparent; position:relative;"></div>
    </main>
    <div class="bottom-action">
      <button class="btn-primary btn-success" id="btn-start-challenge">继续 →</button>
    </div>
  </div>

  <!-- ── 屏 2：答题（全屏纵向布局）──────────────────────────── -->
  <div id="screen-quiz" style="display:none">
    <main class="game-screen">

      <!-- 顶部细条：进度 + 求助（banner-quiz 移入此处，ID 不变供 JS 控制）-->
      <div id="banner-quiz" class="quiz-top-bar" style="display:none">
        <div class="quiz-top-left">
          <div class="station-banner-dot"></div>
          <span id="quiz-station-text">第 N 站</span>
          <span class="banner-question-count" id="quiz-question-count">第 1/5 题</span>
        </div>
        <button class="btn-help-inline" id="btn-help">💡 求助 <span id="help-count">3</span></button>
      </div>

      <!-- 中段：题干（大字、居中）-->
      <div class="quiz-question-section">
        <p class="question-meta" id="question-meta"></p>
        <p class="question-text" id="question-text"></p>
      </div>

      <!-- 下段：选项列 + 反馈区 -->
      <div class="quiz-options-section">
        <div class="options-list" id="options-grid"></div>
        <div id="feedback-area" style="display:none"></div>
      </div>

    </main>
  </div>

  <!-- ── V1-14：地图覆盖层（扫码后若有地图则全屏弹出，动画结束后关闭）── -->
  <div id="map-overlay-layer"
       style="display:none; position:fixed; inset:0; z-index:500;
              background:rgba(0,0,0,0.90); flex-direction:column; align-items:center;
              justify-content:center; padding:20px;">
    <div id="map-overlay-container"
         style="width:min(90vw,560px); height:min(75vw,480px); border-radius:14px;
                overflow:hidden; background:#1a1a2e; position:relative;"></div>
    <p style="color:#fff; margin-top:14px; font-size:16px; font-weight:600;
              opacity:0.9; text-align:center;">✨ 发现了这个地点！</p>
  </div>

  <!-- ── 兜底：数据加载失败 ──────────────────────────────────── -->
  <div id="error-state" style="display:none; padding:48px 24px; text-align:center;
       color:var(--color-error); font-size:17px; line-height:2">
    数据加载失败 😵<br>
    <a href="select-level.html" style="color:var(--color-primary); font-weight:700">
      ← 返回选择探险
    </a>
  </div>

  <!-- Eruda 调试（?debug=1 时加载）-->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <script type="module">
    import {
      loadCurrentQuizData, startChallenge,
      checkAnswer, computeScore,
      recordQuestionResult, advanceQuestionIndex,
      consumeHelp,
    } from '../scripts/quiz-logic.js';
    import db from '../../shared/db/play-db.js';
    import { renderMapOverlay, injectMapAnimStyles } from '../scripts/map-overlay.js?v=V1-15';

    const sessionId = new URLSearchParams(location.search).get('sessionId');
    if (!sessionId) location.href = 'select-level.html';

    // ── 音效预加载 ──────────────────────────────────────────
    const sfxCorrect = new Audio('../assets/sounds/correct.mp3');
    const sfxWrong   = new Audio('../assets/sounds/wrong.mp3');
    sfxCorrect.preload = 'auto';
    sfxWrong.preload   = 'auto';

    function playSound(snd) {
      try { snd.currentTime = 0; snd.play().catch(() => {}); } catch (e) {}
    }

    // ── 题目临时状态（每道新题加载时重置）──────────────────
    let attemptCount         = 0;     // 本题已答错次数
    let usedHelpThisQuestion = false; // 本题是否用过求助
    let optionsLocked        = false; // 防止重复点击或与求助弹窗冲突
    let currentData          = null;  // 最新的 loadCurrentQuizData 返回值
    let wrongChoices         = [];    // 本题选错的答案字母（最多 3 个）

    // ── V1-14：地图渲染需要的数据 ─────────────────────────
    let currentLevel     = null; // Level 对象（含 mapImage 等地图字段）
    let currentAllPoints = [];   // 本探险全部点位（按 order 排序）

    // ── 拼音渲染工具 ─────────────────────────────────────────
    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
      );
    }

    // 整段一次调 pinyin-pro，按字符索引对齐；非汉字原样 HTML 转义输出
    function renderPinyin(text) {
      if (!text) return '';
      const pinyinArr = pinyinPro.pinyin(text, { type: 'array' });
      return Array.from(text).map((char, i) => {
        if (/[一-龥]/.test(char)) {
          return `<ruby>${escHtml(char)}<rt>${escHtml(pinyinArr[i] || '')}</rt></ruby>`;
        }
        return escHtml(char);
      }).join('');
    }

    // ── 初始化 ──────────────────────────────────────────────
    async function init() {
      try {
        currentData      = await loadCurrentQuizData(sessionId);
        const { session, point } = currentData;

        // 加载 level 和全部点位（地图渲染需要）
        currentLevel     = await db.levels.get(session.levelId);
        currentAllPoints = await db.points
          .where('levelId').equals(session.levelId).sortBy('order');

        // 有发现文案 / 答题引导 / 地图 → 显示发现页；三者都没有 → 直接进答题
        const hasDiscovery = point.discoveryText || point.questionIntroText || (currentLevel && currentLevel.mapImage);
        if (hasDiscovery) {
          showDiscoveryScreen(currentData);
        } else {
          await afterDiscovery();
        }
      } catch (err) {
        console.error('[答题页] 初始化失败', err);
        showError();
      }
    }

    // ── 屏 1：发现站点（有发现文案 OR 有地图时调用）────────
    function showDiscoveryScreen(data) {
      const { point, stationNumber, totalStations, session } = data;
      document.getElementById('banner-discovery').style.display = 'flex';
      document.getElementById('banner-quiz').style.display = 'none';
      document.getElementById('discovery-station-text').textContent =
        `第 ${stationNumber} 站 · 共 ${totalStations} 站`;

      // 发现文案
      const textSection = document.getElementById('discovery-text-section');
      if (point.discoveryText) {
        document.getElementById('discovery-text').textContent = point.discoveryText;
        textSection.style.display = 'block';
      } else {
        textSection.style.display = 'none';
      }

      // 答题引导文案（合并到发现页，不再单独弹窗）
      const introTextEl = document.getElementById('intro-text');
      if (point.questionIntroText) {
        introTextEl.textContent = point.questionIntroText;
        introTextEl.style.display = 'block';
      } else {
        introTextEl.style.display = 'none';
      }

      // 地图：有底图就渲染在文案下方，高度随图片比例（去黑边）
      // 对【当前这个点位】播放「浮现」动画：圆圈+名字从透明淡入弹一下
      const mapEl = document.getElementById('discovery-map-container');
      if (currentLevel && currentLevel.mapImage) {
        injectMapAnimStyles();
        renderMapOverlay(mapEl, currentLevel, currentAllPoints, buildStateMap(session), {
          naturalHeight: true,
          animatePointId: point.id,
          animateType: 'reveal',
        });
        mapEl.style.display = 'block';
      } else {
        mapEl.style.display = 'none';
      }

      document.getElementById('screen-discovery').style.display = 'block';
      document.getElementById('screen-quiz').style.display = 'none';
    }

    /** 根据 session 当前进度构建点位状态图 */
    function buildStateMap(session) {
      const stateMap = {};
      currentAllPoints.forEach((pt, i) => {
        if      (i < session.currentPointIndex)  stateMap[pt.id] = 'completed';
        else if (i === session.currentPointIndex) stateMap[pt.id] = 'discovered';
        else                                      stateMap[pt.id] = 'undiscovered';
      });
      return stateMap;
    }

    // ── 「继续 →」按钮（V1-14：进发现文案后的地图/答题引导流程）──
    document.getElementById('btn-start-challenge').addEventListener('click', async () => {
      // iOS 音频解锁：在用户手势内静默触发，解锁后续答题音效
      [sfxCorrect, sfxWrong].forEach(s => {
        s.muted = true;
        s.play().then(() => { s.pause(); s.currentTime = 0; s.muted = false; }).catch(() => {});
      });
      const btn = document.getElementById('btn-start-challenge');
      btn.disabled = true;
      btn.textContent = '⏳';
      try {
        await afterDiscovery();
      } catch (err) {
        console.error('[答题页] 继续出错', err);
        btn.disabled = false;
        btn.textContent = '继续 →';
      }
    });

    // ── V1-14：发现文案 → 地图浮现 → 答题引导 → 答题 ─────────

    /** 发现页「继续 →」后（或无发现内容时 init 直接调用）的衔接逻辑 */
    async function afterDiscovery() {
      document.getElementById('screen-discovery').style.display = 'none';
      await startQuiz();
    }

    /** 正式进入答题：创建 pointRecord + 加载第一道题 */
    async function startQuiz() {
      await startChallenge(sessionId);
      await loadAndShowQuizScreen();
    }

    // ── 屏 2：从 DB 加载当前题并渲染 ─────────────────────
    async function loadAndShowQuizScreen() {
      currentData = await loadCurrentQuizData(sessionId);
      // 每道新题重置临时状态
      attemptCount         = 0;
      usedHelpThisQuestion = false;
      optionsLocked        = false;
      wrongChoices         = [];
      showQuizScreen(currentData);
    }

    function showQuizScreen(data) {
      const { session, question, stationNumber, questionNumber, totalQuestions } = data;
      const remainingHelp = session.maxHelpCount - session.helpUsedCount;

      // 横幅切到屏 2（banner-quiz 现在在 screen-quiz 内部，隐藏外层 banner）
      document.getElementById('quiz-banner').style.display = 'none';
      document.getElementById('banner-quiz').style.display = 'flex';
      document.getElementById('quiz-station-text').textContent = `第 ${stationNumber} 站`;
      document.getElementById('quiz-question-count').textContent =
        `第 ${questionNumber}/${totalQuestions} 题`;
      document.getElementById('help-count').textContent = remainingHelp;
      document.getElementById('btn-help').disabled = (remainingHelp <= 0);

      // 题目元信息（学科 + 难度星）
      const diff = Math.max(1, Math.min(3, question.difficulty || 1));
      document.getElementById('question-meta').textContent =
        `${question.subject || '综合'} · ${'★'.repeat(diff)}${'☆'.repeat(3 - diff)}`;

      // 读拼音开关（每道题渲染时实时读，改完设置下一道题就生效）
      const showPinyin = (localStorage.getItem('play-show-pinyin') ?? 'on') === 'on';

      // 题干
      const qtEl = document.getElementById('question-text');
      if (showPinyin) {
        qtEl.innerHTML = renderPinyin(question.text);
      } else {
        qtEl.textContent = question.text;
      }

      // 选项 A/B/C/D（label 字母不标拼音；只对 option-text span 做拼音）
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      const labels = ['A', 'B', 'C', 'D'];
      (question.options || []).forEach((optText, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        const ls = document.createElement('span'); ls.className = 'option-label'; ls.textContent = labels[idx];
        const ts = document.createElement('span'); ts.className = 'option-text';
        if (showPinyin) {
          ts.innerHTML = renderPinyin(optText);
        } else {
          ts.textContent = optText;
        }
        btn.appendChild(ls); btn.appendChild(ts);
        btn.addEventListener('click', () => onSelectOption(idx));
        grid.appendChild(btn);
      });

      hideFeedback();
      document.getElementById('screen-discovery').style.display = 'none';
      document.getElementById('screen-quiz').style.display = 'block';
    }

    // ── 选项点击 ──────────────────────────────────────────
    async function onSelectOption(selectedIndex) {
      if (optionsLocked) return;
      optionsLocked = true;

      const { question, questionId, questionNumber, totalQuestions } = currentData;
      const optBtns = [...document.querySelectorAll('.option-btn')];
      optBtns.forEach(b => b.disabled = true);
      hideFeedback();

      const isCorrect = checkAnswer(question, selectedIndex);
      const hasMore   = questionNumber < totalQuestions;

      if (isCorrect) {
        // ── 答对 ────────────────────────────────────────
        playSound(sfxCorrect);
        optBtns[selectedIndex].classList.add('option-correct');

        const score = computeScore(attemptCount, usedHelpThisQuestion);
        await recordQuestionResult(
          sessionId, questionId, attemptCount + 1, usedHelpThisQuestion, score, wrongChoices
        );
        showFeedback('correct');

        setTimeout(async () => {
          hideFeedback();
          try {
            if (hasMore) {
              await advanceQuestionIndex(sessionId);
              await loadAndShowQuizScreen();
            } else {
              // 本站答完 → 拍照页（M24 实现，现在 404 正常）
              location.href = `photo.html?sessionId=${encodeURIComponent(sessionId)}`;
            }
          } catch (err) { console.error('[答题页] 切题失败', err); showError(); }
        }, 1000);

      } else {
        // ── 答错 ────────────────────────────────────────
        wrongChoices.push('ABCD'[selectedIndex]); // 记录选错的字母
        attemptCount++;
        playSound(sfxWrong);
        optBtns[selectedIndex].classList.add('option-wrong', 'option-shake');
        optBtns[selectedIndex].addEventListener(
          'animationend',
          () => optBtns[selectedIndex].classList.remove('option-shake'),
          { once: true }
        );

        if (attemptCount >= 3) {
          // 第 3 次错：保底通过，高亮正确答案，其余选项变灰，写 score=0
          const ci = 'ABCD'.indexOf(String(question.correctAnswer).trim().toUpperCase());
          optBtns.forEach((b, i) => { if (i !== ci) b.classList.add('option-dimmed'); });
          if (optBtns[ci]) optBtns[ci].classList.add('option-bust-correct');
          await recordQuestionResult(sessionId, questionId, 3, usedHelpThisQuestion, 0, wrongChoices);
          showFeedback('bust', {
            correctText: question.options[ci],
            explanation: question.explanation,
            onConfirm: async () => {
              hideFeedback();
              try {
                if (hasMore) {
                  await advanceQuestionIndex(sessionId);
                  await loadAndShowQuizScreen();
                } else {
                  location.href = `photo.html?sessionId=${encodeURIComponent(sessionId)}`;
                }
              } catch (err) { console.error('[答题页] 切题失败', err); showError(); }
            },
          });

        } else {
          // 第 1-2 次错：显示提示，0.6s 后恢复选项允许重选
          showFeedback('wrong', { hint: question.hint });
          setTimeout(() => {
            optBtns[selectedIndex].classList.remove('option-wrong');
            optBtns.forEach(b => b.disabled = false);
            optionsLocked = false;
          }, 600);
        }
      }
    }

    // ── 求助按钮 ──────────────────────────────────────────
    document.getElementById('btn-help').addEventListener('click', () => {
      const { session } = currentData;
      const remaining = session.maxHelpCount - session.helpUsedCount;
      if (remaining <= 0) {
        showFeedback('help-exhausted');
        return;
      }
      // 锁定选项，防止同时操作
      optionsLocked = true;
      [...document.querySelectorAll('.option-btn')].forEach(b => b.disabled = true);
      showFeedback('help-confirm');
    });

    // ── 反馈区：按类型渲染不同卡片 ────────────────────────
    function showFeedback(type, data = {}) {
      const area = document.getElementById('feedback-area');
      area.innerHTML = '';
      area.className = 'feedback-area';

      if (type === 'correct') {
        area.classList.add('feedback-correct');
        area.textContent = '🎉 答对啦！';

      } else if (type === 'wrong') {
        area.classList.add('feedback-wrong');
        const msg = document.createElement('p');
        msg.className = 'feedback-main-text';
        msg.textContent = '答案不正确，再思考一下吧 🫤';
        area.appendChild(msg);
        if (data.hint) {
          const hint = document.createElement('p');
          hint.className = 'feedback-hint-text';
          hint.textContent = `💡 提示：${data.hint}`;
          area.appendChild(hint);
        }

      } else if (type === 'bust') {
        area.classList.add('feedback-wrong');
        const msg = document.createElement('p');
        msg.className = 'feedback-main-text';
        msg.textContent = '没关系，下次记住啦！🌟';
        area.appendChild(msg);
        // 显示正确答案（纯文字，不抓按钮 DOM 避免黏连 A/B 标签）
        if (data.correctText) {
          const ans = document.createElement('p');
          ans.className = 'feedback-hint-text';
          ans.textContent = `✅ 正确答案：${data.correctText}`;
          area.appendChild(ans);
        }
        // 仅当 explanation 非空时才显示解析行
        if (data.explanation) {
          const exp = document.createElement('p');
          exp.className = 'feedback-hint-text';
          exp.textContent = `📖 解析：${data.explanation}`;
          area.appendChild(exp);
        }
        if (data.onConfirm) {
          const btn = document.createElement('button');
          btn.className = 'btn-bust-confirm';
          btn.textContent = '好的，记住了！';
          btn.addEventListener('click', data.onConfirm);
          area.appendChild(btn);
        }

      } else if (type === 'help-confirm') {
        area.classList.add('feedback-help');
        const title = document.createElement('p');
        title.className = 'feedback-help-title';
        title.textContent = '确定求助爸爸妈妈吗？';
        area.appendChild(title);

        const actions = document.createElement('div');
        actions.className = 'feedback-help-actions';

        const btnYes = document.createElement('button');
        btnYes.className = 'btn-help-confirm btn-help-yes';
        btnYes.textContent = '确定！扣掉一次求助次数';

        const btnNo = document.createElement('button');
        btnNo.className = 'btn-help-confirm btn-help-no';
        btnNo.textContent = '不用了，我再自己想想';

        actions.appendChild(btnYes);
        actions.appendChild(btnNo);
        area.appendChild(actions);

        btnYes.addEventListener('click', async () => {
          btnYes.disabled = true;
          btnNo.disabled  = true;
          const remaining = await consumeHelp(sessionId);
          usedHelpThisQuestion = true;
          document.getElementById('help-count').textContent = remaining;
          if (remaining <= 0) document.getElementById('btn-help').disabled = true;
          showFeedback('help-ask');
          // 2 秒后关闭提示，恢复选项
          setTimeout(() => {
            hideFeedback();
            [...document.querySelectorAll('.option-btn')].forEach(b => b.disabled = false);
            optionsLocked = false;
          }, 2000);
        });

        btnNo.addEventListener('click', () => {
          hideFeedback();
          [...document.querySelectorAll('.option-btn')].forEach(b => b.disabled = false);
          optionsLocked = false;
        });

      } else if (type === 'help-ask') {
        area.classList.add('feedback-help');
        const msg = document.createElement('p');
        msg.className = 'feedback-help-title';
        msg.textContent = '快去问爸爸妈妈！👨‍👩‍👧';
        area.appendChild(msg);

      } else if (type === 'help-exhausted') {
        area.classList.add('feedback-help');
        const msg = document.createElement('p');
        msg.className = 'feedback-help-title';
        msg.textContent = '已经没有求助次数咯，自己再思考一下吧！💪';
        area.appendChild(msg);
        setTimeout(() => hideFeedback(), 2000);
      }

      // block：卡片内文字/按钮各自独看一行（居中由 CSS align-self 处理）
      area.style.display = 'block';
      // 矮屏上「保底」确认按钮可能被折叠线遮住，主动滚入可见区
      if (type === 'bust') {
        requestAnimationFrame(() => area.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
      }
    }

    function hideFeedback() {
      const area = document.getElementById('feedback-area');
      area.style.display = 'none';
      area.innerHTML = '';
    }

    // ── 兜底错误 ──────────────────────────────────────────
    function showError() {
