<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90E2">
  <link rel="manifest" href="manifest.json">
  <!-- iOS PWA 专属 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="寻宝游戏">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <title>寻宝游戏</title>
  <!-- Dexie CDN（普通 script，先加载以便 SW 缓存；启动页本身不调用 db） -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>

  <style>
    /* 变量从 main.css 复制，避免启动页依赖外部 CSS 文件（减少首屏等待） */
    :root {
      --color-primary: #4A90E2;
      --color-primary-dark: #3A7BC8;
      --color-accent: #F5A623;
      --color-bg-game: #FFF9E6;
      --color-text: #2C3E50;
      --color-text-muted: #6C757D;
      --radius-btn: 12px;
      --shadow-float: 0 4px 12px rgba(0,0,0,0.15);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-bg-game);
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      color: var(--color-text);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
    }

    /* ====== 主内容区（居中）====== */
    .launch-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px 24px;
      gap: 20px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* ====== Logo 方块（蓝色圆角，地图 emoji 居中）====== */
    .logo-box {
      width: 120px;
      height: 120px;
      background: var(--color-primary);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      line-height: 1;
      box-shadow: var(--shadow-float);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ====== 文字区 ====== */
    .launch-title {
      font-size: 36px;
      font-weight: 900;
      color: var(--color-text);
      letter-spacing: 4px;
      text-align: center;
    }

    .launch-subtitle {
      font-size: 16px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.5;
      margin-top: -8px;
    }

    /* ====== 开始游戏按钮 ====== */
    .btn-start {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 72px;
      background: var(--color-primary);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius-btn);
      font-size: 22px;
      font-weight: 800;
      box-shadow: var(--shadow-float);
      transition: transform 0.12s ease, background 0.12s ease;
      margin-top: 12px;
    }
    .btn-start:active {
      transform: scale(0.96);
      background: var(--color-primary-dark);
    }

    /* ====== 底部设置入口（右下角，不显眼）====== */
    .settings-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: var(--color-text-muted);
      font-size: 14px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .settings-link:active { opacity: 0.7; }

    /* ====== 横屏小屏适配 ====== */
    @media (orientation: landscape) and (max-height: 480px) {
      .logo-box { width: 72px; height: 72px; font-size: 40px; animation: none; }
      .launch-title { font-size: 28px; letter-spacing: 2px; }
      .launch-body { gap: 12px; padding: 16px 32px 16px; }
      .btn-start { min-height: 56px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- 启动页主体 -->
  <div class="launch-body">
    <div class="logo-box">🗺️</div>
    <h1 class="launch-title">寻宝游戏</h1>
    <p class="launch-subtitle">和小伙伴一起去探险吧！</p>
    <a href="pages/select-level.html" class="btn-start">🎮 开始游戏</a>
  </div>

  <!-- 右下角设置入口（不显眼）-->
  <a href="pages/settings.html" class="settings-link">⚙️ 设置</a>

  <!-- Eruda 调试（仅 ?debug=1 时加载）-->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- 注册 Service Worker（仅在根入口注册一次，覆盖整个 play/ 目录）-->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(r => console.log('[SW] 注册成功，范围：', r.scope))
          .catch(e => console.error('[SW] 注册失败：', e));
      });
    }
  </script>

</body>
</html>
