<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端视口：禁止用户缩放，游戏界面不需要缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <!-- 浏览器工具栏主题色 -->
  <meta name="theme-color" content="#4A90E2">

  <!-- PWA 配置 -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS Safari 专属 PWA 配置（iOS 对 PWA 标准支持不完整，需要单独写） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="寻宝游戏">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">

  <title>寻宝游戏</title>

  <!-- ====== CDN 库（普通 <script>，必须在 type="module" 之前）====== -->
  <!-- Dexie.js：IndexedDB 封装，挂载到全局 Dexie -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <!-- html5-qrcode / qrcode-generator 等扫码库在 M20 引入，这里暂不加载 -->

  <style>
    /* ====== CSS 变量（来自 design-tokens.md）====== */
    :root {
      --color-primary:      #4A90E2;
      --color-primary-dark: #3A7BC8;
      --color-accent:       #F5A623;
      --color-success:      #7ED321;
      --color-error:        #FF9F89;
      --color-bg-game:      #FFF9E6;
      --color-text:         #2C3E50;
      --color-text-muted:   #6C757D;
      --radius-btn:         12px;
      --radius-card:        16px;
      --shadow-float:       0 4px 12px rgba(0,0,0,0.15);
    }

    /* ====== 基础重置 ====== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* 游戏端暖背景（design-tokens §一 游戏端专用背景） */
      background: var(--color-bg-game);
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      color: var(--color-text);
      /* 游戏界面禁止文字选择和双击缩放 */
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ====== 启动骨架（M17 替换为真实页面组件）====== */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 32px 24px;
      gap: 20px;
    }

    .skeleton-icon {
      font-size: 80px;
      line-height: 1;
      filter: drop-shadow(var(--shadow-float));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .skeleton-title {
      font-size: 36px;
      font-weight: 900;
      color: var(--color-primary);
      letter-spacing: 4px;
    }

    .skeleton-hint {
      font-size: 16px;
      color: var(--color-text-muted);
    }

    /* ====== 横屏小屏适配 ====== */
    @media (orientation: landscape) and (max-height: 480px) {
      .skeleton-icon { font-size: 48px; animation: none; }
      .skeleton-title { font-size: 26px; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

  <!-- 应用挂载点：M17 开始由 JS 渲染真实页面 -->
  <div id="app">
    <div class="skeleton-icon">🗺️</div>
    <h1 class="skeleton-title">寻宝游戏</h1>
    <p class="skeleton-hint">正在加载…</p>
  </div>

  <!-- ====== Eruda 调试面板（仅 URL 带 ?debug=1 时加载）====== -->
  <!-- 在 iPad 上调试时，在网址末尾加 ?debug=1，点右下角齿轮打开控制台 -->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- ====== 注册 Service Worker ====== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('[SW] 注册成功，范围：', reg.scope))
          .catch(err => console.error('[SW] 注册失败：', err));
      });
    }
  </script>

  <!-- ====== 应用入口（ES Module，必须在 CDN <script> 之后）====== -->
  <!-- M17 开始在这里渲染真实页面，M16 只初始化数据库连接 -->
  <script type="module">
    import db from '../shared/db/play-db.js';
    // db 已就绪，M17 在此渲染首页
    console.log('[App] play-db 初始化成功');
  </script>

</body>
</html>
