<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑端 - 寻宝游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f6f9;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            padding: 32px 24px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1A237E;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        /* 返回主页按钮 */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1565C0;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.12s ease;
        }

        .btn-back:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📝</div>
        <h1>编辑端开发中...</h1>
        <p>
            家长的关卡编辑和题库管理功能正在建设中，<br>
            敬请期待！
        </p>
        <a href="../" class="btn-back">← 返回主页</a>
    </div>

</body>
</html>
