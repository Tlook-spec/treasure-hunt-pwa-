<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打印应急小抄</title>

  <!-- CDN：必须在 type="module" 之前 -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Microsoft YaHei', '苹方', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ── 顶部工具栏 ── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .toolbar-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-primary   { background: #4A90E2; color: #fff; }

    /* ── iPad 警告 ── */
    .ipad-warning {
      background: #fff8e1;
      border: 1px solid #f9a825;
      border-radius: 8px;
      padding: 10px 16px;
      margin: 12px 20px;
      font-size: 13px;
      line-height: 1.6;
      color: #5d4000;
    }

    /* ── 内容区 ── */
    .content {
      padding: 24px 28px;
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      margin-top: 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    /* ── 小抄头部 ── */
    .sheet-title {
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }

    .sheet-subtitle {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 20px;
    }

    .sheet-desc {
      font-size: 14px;
      color: #555;
      background: #f9f9f9;
      border-left: 3px solid #4A90E2;
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* ── 表格 ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    thead th {
      background: #4A90E2;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
    }

    tbody tr:nth-child(even) { background: #f7f9fc; }
    tbody tr:hover           { background: #eef4fd; }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #e0e0e0;
      vertical-align: top;
      line-height: 1.5;
    }

    .col-num   { width: 48px;  text-align: center; color: #888; }
    .col-name  { width: 22%;  font-weight: 600; }
    .col-code  {
      width: 130px;
      font-family: 'Courier New', monospace;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 4px;
      color: #222;
    }
    .col-note  { color: #666; font-size: 13px; }

    /* ── 底部 ── */
    .sheet-footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      text-align: right;
    }

    /* 加载 / 错误提示 */
    .status-msg {
      text-align: center;
      padding: 60px 0;
      color: #888;
      font-size: 15px;
    }

    /* ════════════════════════════════
       打印专用样式
    ════════════════════════════════ */
    @media print {
      .toolbar,
      .ipad-warning { display: none !important; }

      body { background: #fff; }

      @page { size: A4 portrait; margin: 15mm; }

      .content {
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 0;
        max-width: none;
      }

      .sheet-title    { font-size: 20px; margin-bottom: 4px; }
      .sheet-subtitle { font-size: 11px; margin-bottom: 12px; }
      .sheet-desc     { font-size: 12px; margin-bottom: 14px; padding: 6px 10px; }

      table { font-size: 13px; }

      thead th { padding: 7px 10px; font-size: 12px; }
      tbody td  { padding: 7px 10px; }

      .col-code { font-size: 15px; letter-spacing: 3px; }

      /* 表格整体不分页 */
      table { break-inside: avoid; page-break-inside: avoid; }

      .sheet-footer { font-size: 10px; margin-top: 12px; }
    }
  </style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <button class="btn btn-secondary" onclick="history.back()">← 返回</button>
  <span class="toolbar-title" id="toolbar-title">打印应急小抄</span>
  <button class="btn btn-primary" onclick="window.print()">🖨️ 立即打印</button>
</div>

<!-- iPad 打印警告 -->
<div class="ipad-warning">
  ⚠️ 建议在电脑浏览器上完成打印。iPad Safari 的打印对话框 CSS 支持有限，可能导致排版混乱。如果在 iPad 上，建议先「另存为 PDF」再打印。
</div>

<!-- 应急小抄内容 -->
<div class="content">
  <div class="sheet-title"  id="sheet-title">加载中…</div>
  <div class="sheet-subtitle" id="sheet-subtitle"></div>
  <div class="sheet-desc">
    📋 出门前打印或截图存手机，户外二维码丢失 / 扫不出时备查
  </div>
  <div id="table-container">
    <div class="status-msg">正在加载…</div>
  </div>
  <div class="sheet-footer" id="sheet-footer"></div>
</div>

<script type="module">
  import db from '../../shared/db/admin-db.js';

  const params  = new URLSearchParams(location.search);
  const levelId = params.get('levelId');

  if (!levelId) {
    showError('缺少 levelId 参数，请从探险详情页「打印应急小抄」按钮进入。');
  } else {
    try {
      const [level, points] = await Promise.all([
        db.levels.get(levelId),
        db.points.where('levelId').equals(levelId).sortBy('order'),
      ]);

      if (!level) {
        showError('找不到该探险，请返回重试。');
      } else if (points.length === 0) {
        showError('该探险还没有点位，请先在编辑端添加点位后再打印。');
      } else {
        const printDate = new Date().toLocaleDateString('zh-CN', {
          year: 'numeric', month: 'long', day: 'numeric',
        });

        document.title = `${level.name} · 应急小抄`;
        document.getElementById('toolbar-title').textContent = `${level.name} · 应急小抄`;
        document.getElementById('sheet-title').textContent   = level.name;
        document.getElementById('sheet-subtitle').textContent =
          `应急小抄 · 共 ${points.length} 个点位`;

        // 构建表格
        const rows = points.map(pt => `
          <tr>
            <td class="col-num">${pt.order}</td>
            <td class="col-name">${escapeHtml(pt.name)}</td>
            <td class="col-code">${pt.code}</td>
            <td class="col-note">${escapeHtml(pt.parentNote || '—')}</td>
          </tr>
        `).join('');

        document.getElementById('table-container').innerHTML = `
          <table>
            <thead>
              <tr>
                <th class="col-num">序号</th>
                <th class="col-name">点位名称</th>
                <th class="col-code">数字码</th>
                <th class="col-note">家长备忘</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;

        document.getElementById('sheet-footer').textContent =
          `打印日期：${printDate}　·　寻宝游戏`;
      }
    } catch (err) {
      showError('加载数据时出错：' + err.message);
    }
  }

  function showError(msg) {
    document.getElementById('sheet-title').textContent = '出错了';
    document.getElementById('table-container').innerHTML =
      `<div class="status-msg">⚠️ ${msg}</div>`;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
