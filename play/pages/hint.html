<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F4EAD5">
  <link rel="stylesheet" href="../styles/main.css">
  <title>找下一站 - 寻宝游戏</title>
  <style>
    /* ── 站点步进条（顶部进度，高亮当前站）── */
    .station-stepper { padding: 16px 12px 4px; }
    .stepper-track {
      display: flex; align-items: center; justify-content: center;
    }
    .stepper-node {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
      background: #E5DCC5; color: #B0A189;
    }
    .stepper-node.done    { background: #E8B43C; color: #fff; }
    .stepper-node.current {
      background: #E0772F; color: #fff;
      box-shadow: 0 2px 8px rgba(224,119,47,0.45);
    }
    .stepper-line {
      height: 4px; width: 22px; flex-shrink: 0; border-radius: 2px;
      background: #E5DCC5;
    }
    .stepper-label {
      margin-top: 10px; text-align: center;
      font-size: 15px; font-weight: 700; letter-spacing: 1px;
      color: #C2651F;
    }
    /* ── 提示图片（尺寸约束同地图：整图一屏内、不撑满、居中）── */
    .hint-image-wrap {
      margin: 12px auto 0;
      width: -webkit-fit-content;   /* iOS Safari 前缀兜底 */
      width: fit-content;
      max-width: calc(100% - 32px);
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.1);
    }
    .hint-image-wrap img {
      display: block;
      width: auto; height: auto;
      max-width: 100%; max-height: 55vh;   /* 和地图默认 55vh 一致 */
    }
  </style>
  <!-- CDN 库（普通 script，必须在 type="module" 之前）-->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
</head>
<body>

  <!-- V1-21 暂停按钮：hint 页取消了顶部进度条（下方步进条已显示进度），
       暂停按钮单独浮在左上角 -->
  <button id="btn-pause" class="btn-pause" aria-label="暂停"
          style="position:fixed; top:12px; left:12px; z-index:30;
                 box-shadow:0 1px 6px rgba(0,0,0,0.12);">⏸</button>

  <!-- 主内容 -->
  <main class="page-content has-bottom-action">

    <!-- 站点步进条（顶部进度，高亮当前站），JS 渲染完成后才显示 -->
    <div id="station-stepper" class="station-stepper" style="display:none"></div>

    <!-- 标题（JS 填入「前往第 X 站」）-->
    <h2 class="hint-section-title" id="hint-section-title">前往下一站</h2>

    <!-- 提示卡片（locationHint），JS 渲染完成后才显示 -->
    <div class="hint-card" id="hint-card" style="display:none">
      <div class="hint-card-label">💡 提示</div>
      <p class="hint-card-text" id="hint-text"></p>
      <p class="hint-card-fallback">（仔细看二维码贴在哪里）</p>
    </div>

    <!-- 提示图片（point.hintImage 非空时显示）-->
    <div id="hint-image-wrap" class="hint-image-wrap" style="display:none">
      <img id="hint-image" alt="提示图片">
    </div>

    <!-- 数据加载失败时显示（默认隐藏）-->
    <div id="error-state" style="display:none;padding:32px 0;text-align:center;color:#FF9F89;font-size:17px;line-height:1.8">
      数据加载失败<br>
      <a href="select-level.html" style="color:var(--color-primary);font-weight:700;font-size:16px">
        ← 返回选择探险
      </a>
    </div>

  </main>

  <!-- 底部固定：找到了，去扫码（绿色，JS 渲染完成后才显示）-->
  <div class="bottom-action">
    <button class="btn-primary btn-success" id="btn-scan" style="display:none">
      📷 我找到了！扫码！
    </button>
  </div>

  <!-- V1-16 浮动地图按钮（有 mapImage 才显示；right 20px bottom 96px 避开扫码底栏）-->
  <button id="btn-map-fab"
          aria-label="查看地图"
          style="display:none; position:fixed; right:20px; bottom:96px; z-index:100;
                 width:60px; height:60px; border-radius:50%;
                 border:1.5px solid #E0D3B0;
                 background:#FDF8EE; font-size:26px;
                 box-shadow:0 4px 14px rgba(0,0,0,0.35); cursor:pointer;
                 align-items:center; justify-content:center;">🗺️</button>

  <!-- V1-16 地图查看全屏覆盖层 -->
  <div id="map-view-overlay"
       style="display:none; position:fixed; inset:0; z-index:300;
              background:rgba(0,0,0,0.88); overflow-y:auto;">
    <!-- 右上角关闭按钮 -->
    <button id="btn-close-map-view"
            aria-label="关闭地图"
            style="position:fixed; top:16px; right:16px; z-index:301;
                   width:44px; height:44px; border-radius:50%; border:none;
                   background:rgba(255,255,255,0.18); color:#fff; font-size:20px;
                   font-weight:700; cursor:pointer;">✕</button>
    <!-- 地图容器（renderMapOverlay 在此渲染，每次打开前清空重绘）-->
    <div id="map-view-container" style="margin:60px auto 40px; position:relative;"></div>
  </div>

  <!-- V1-21 暂停遮罩（盖住整屏；点继续才回到游戏）-->
  <div id="pause-overlay" class="pause-overlay" style="display:none">
    <div class="pause-card">
      <div class="pause-card-icon">⏸</div>
      <div class="pause-card-title">已暂停</div>
      <div class="pause-card-sub">休息一下，准备好再继续吧</div>
      <button id="btn-resume" class="btn-resume">▶ 继续游戏</button>
    </div>
  </div>

  <!-- Eruda 调试 -->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- ES Module：以 session 为唯一数据源，展示当前点位提示 -->
  <script type="module">
    import db from '../../shared/db/play-db.js';
    import { renderMapOverlay, injectMapAnimStyles, buildPointStateMap } from '../scripts/map-overlay.js?v=V1-27';

    const sessionId = new URLSearchParams(location.search).get('sessionId');
    if (!sessionId) {
      location.href = 'select-level.html';
    }

    // 模块级：供 FAB 点击时使用
    let currentLevel     = null;
    let currentAllPoints = [];
    let currentSession   = null;

    async function init() {
      // 读取会话
      const session = await db.sessions.get(sessionId);
      if (!session) {
        location.href = 'select-level.html';
        return;
      }

      currentSession = session;
      const { levelId, currentPointIndex } = session;

      // 读取该探险所有点位，按 order 升序
      const allPoints = await db.points
        .where('levelId').equals(levelId)
        .sortBy('order');

      currentAllPoints = allPoints;
      const totalStations = allPoints.length;
      const currentPoint  = allPoints[currentPointIndex];

      if (!currentPoint) {
        console.error('[提示页] 找不到点位，currentPointIndex=', currentPointIndex,
                      'allPoints.length=', totalStations);
        showError();
        return;
      }

      // 加载 level 对象（地图渲染需要）
      currentLevel = await db.levels.get(levelId);

      // ── 站号（标题 + 步进条用）──
      const stationNum = currentPointIndex + 1;

      // ── 标题：前往第 X 站 ──
      document.getElementById('hint-section-title').textContent = `前往第 ${stationNum} 站`;

      // ── 渲染站点步进条（高亮当前站）──
      renderStationStepper(allPoints, currentPointIndex);

      // ── 渲染提示卡片 ──
      document.getElementById('hint-text').textContent =
        currentPoint.locationHint || '仔细看二维码贴在哪里';
      document.getElementById('hint-card').style.display = 'block';

      // ── 提示图片（有 hintImage 才显示）──
      if (currentPoint.hintImage) {
        document.getElementById('hint-image').src = currentPoint.hintImage;
        document.getElementById('hint-image-wrap').style.display = 'block';
      }

      // ── 显示扫码按钮 ──
      const btnScan = document.getElementById('btn-scan');
      btnScan.style.display = 'flex';
      btnScan.addEventListener('click', () => {
        location.href = `scan.html?sessionId=${encodeURIComponent(sessionId)}`;
      });

      // ── V1-16：有地图才显示浮动按钮 ──
      if (currentLevel && currentLevel.mapImage) {
        injectMapAnimStyles();
        document.getElementById('btn-map-fab').style.display = 'flex';
      }

      // ── V1-21：若上次是「暂停着关 App」→ 直接显示暂停遮罩 ──
      if (session.pauseStartedAt != null) {
        document.getElementById('pause-overlay').style.display = 'flex';
      }
    }

    // ── 站点步进条：N 个圆点连线，当前站橙色高亮 ──
    function renderStationStepper(allPoints, currentIndex) {
      const el = document.getElementById('station-stepper');
      const track = document.createElement('div');
      track.className = 'stepper-track';
      allPoints.forEach((pt, i) => {
        if (i > 0) {
          const line = document.createElement('div');
          line.className = 'stepper-line';
          track.appendChild(line);
        }
        const node = document.createElement('div');
        const cls = i === currentIndex ? ' current' : (i < currentIndex ? ' done' : '');
        node.className = 'stepper-node' + cls;
        node.textContent = String(i + 1);
        track.appendChild(node);
      });
      const label = document.createElement('div');
      label.className = 'stepper-label';
      label.textContent = `第 ${currentIndex + 1} 站 / 共 ${allPoints.length} 站`;
      el.innerHTML = '';
      el.appendChild(track);
      el.appendChild(label);
      el.style.display = 'block';
    }

    // ── V1-21 主动暂停：暂停计时 + 全屏遮挡；继续时累加 pausedMs ──
    // pausedMs / pauseStartedAt 只存 session(IndexedDB)，不进导出、不动 schema。
    async function pauseGame() {
      const s = await db.sessions.get(sessionId);
      if (!s || s.status === 'completed') return;
      if (s.pauseStartedAt == null) {
        await db.sessions.update(sessionId, { pauseStartedAt: Date.now() });
      }
      document.getElementById('pause-overlay').style.display = 'flex';
    }
    async function resumeGame() {
      const s = await db.sessions.get(sessionId);
      if (s && s.pauseStartedAt != null) {
        const add      = Math.max(0, Date.now() - s.pauseStartedAt);
        const pausedMs = (s.pausedMs || 0) + add;
        await db.sessions.update(sessionId, { pausedMs, pauseStartedAt: null });
      }
      document.getElementById('pause-overlay').style.display = 'none';
    }
    document.getElementById('btn-pause').addEventListener('click', pauseGame);
    document.getElementById('btn-resume').addEventListener('click', resumeGame);

    // ── V1-16 FAB 点击：打开覆盖层，渲染纯查看地图（无动画）──
    // hint.html 场景：还没扫码当前站 → pointRecord 不存在 → buildPointStateMap 返回 undiscovered
    // 之前已完成的站 → pointRecord 存在且 questionResults 已满 → returned completed ✅
    document.getElementById('btn-map-fab').addEventListener('click', () => {
      if (!currentLevel || !currentSession) return;
      const container = document.getElementById('map-view-container');
      renderMapOverlay(
        container, currentLevel, currentAllPoints,
        buildPointStateMap(currentSession, currentAllPoints),
        { naturalHeight: true, maxHeight: '70vh' }
      );
      document.getElementById('map-view-overlay').style.display = 'block';
    });

    // ── V1-16 关闭覆盖层 ──
    document.getElementById('btn-close-map-view').addEventListener('click', () => {
      document.getElementById('map-view-overlay').style.display = 'none';
    });

    function showError() {
      document.getElementById('hint-card').style.display   = 'none';
      document.getElementById('btn-scan').style.display    = 'none';
      document.getElementById('btn-map-fab').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
    }

    init().catch(err => {
      console.error('[提示页] 初始化失败', err);
      showError();
    });
  </script>

</body>
</html>
