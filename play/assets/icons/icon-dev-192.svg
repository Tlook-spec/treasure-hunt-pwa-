<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <!-- 橙红渐变背景：明显区别于正式版的蓝色 -->
    <linearGradient id="bgDev192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
    <linearGradient id="goldDev192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- 背景：橙红圆角正方形 -->
  <rect width="192" height="192" rx="36" fill="url(#bgDev192)"/>

  <!-- 宝箱（上移，给底部 DEV 大字留空间） -->
  <rect x="46" y="74" width="100" height="50" rx="9" fill="url(#goldDev192)"/>
  <path d="M 46 74 Q 46 42 96 42 Q 146 42 146 74 Z" fill="#FFD600"/>
  <rect x="46" y="70" width="100" height="7" rx="2" fill="#E65100"/>
  <rect x="81" y="64" width="30" height="24" rx="6" fill="#7F1D0A"/>
  <circle cx="96" cy="79" r="7" fill="#FF8F00"/>
  <circle cx="96" cy="79" r="3.5" fill="#E65100"/>

  <!-- DEV 大字（最强区分信号） -->
  <text
    x="96" y="166"
    font-size="44"
    font-weight="800"
    text-anchor="middle"
    fill="#FFFFFF"
    letter-spacing="2"
    font-family="Arial, Helvetica, sans-serif"
  >DEV</text>
</svg>
