<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A2230">
  <title>扫码 - 寻宝游戏</title>
  <!-- 深色独立样式，不加载 main.css -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      background: #1A2230;
      min-height: 100vh; min-height: 100dvh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      color: #fff;
      display: flex; flex-direction: column;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ====== 顶部导航 ====== */
    .scan-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; min-height: 52px; flex-shrink: 0;
      background: rgba(0,0,0,0.25);
    }
    #btn-back {
      background: none; border: none; color: rgba(255,255,255,0.85);
      font-size: 16px; font-weight: 600; padding: 8px 12px; cursor: pointer;
      border-radius: 10px; min-height: 44px; min-width: 72px;
    }
    #btn-back:active { background: rgba(255,255,255,0.15); }
    .scan-title { font-size: 17px; font-weight: 700; }
    #station-label { font-size: 14px; color: rgba(255,255,255,0.55); min-width: 72px; text-align: right; }

    /* ====== 摄像头主区域 ====== */
    .scan-camera-section {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 24px; gap: 14px;
    }
    .camera-wrapper {
      position: relative;
      width: min(88vw, 420px); height: min(88vw, 420px);
      border-radius: 16px; overflow: hidden; background: #060D1C;
    }
    #start-overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 24px;
      border: 2px solid rgba(255,255,255,0.08); border-radius: 16px;
    }
    .start-icon { font-size: 60px; line-height: 1; opacity: 0.75; }
    #btn-start-scan {
      background: linear-gradient(#EC9646, #DA7530); color: #FFF7E9; border: none;
      border-radius: 999px; padding: 14px 32px;
      font-size: 18px; font-weight: 800; letter-spacing: 2px; cursor: pointer;
      width: 100%; max-width: 240px; min-height: 56px;
      box-shadow: 0 5px 0 #B85C1F, 0 10px 18px rgba(184,92,31,0.35);
    }
    #btn-start-scan:active { transform: translateY(3px); box-shadow: 0 2px 0 #B85C1F; }
    #btn-start-scan:disabled { opacity: 0.5; }
    #error-content {
      display: none; flex-direction: column;
      align-items: center; gap: 14px; text-align: center;
    }
    .error-icon { font-size: 48px; }
    .error-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.7; }
    #btn-retry-scan {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 10px; padding: 10px 24px;
      font-size: 15px; font-weight: 600; cursor: pointer; min-height: 44px;
    }
    #btn-retry-scan:active { background: rgba(255,255,255,0.22); }
    #reader { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 16px; }
    /* 方案A：取景框四角（青绿），叠在摄像头画面上方、成功遮罩下方 */
    .vf-corner {
      position: absolute; width: 48px; height: 48px; z-index: 12; pointer-events: none;
    }
    .vf-corner.tl { left: 10px;  top: 10px;    border-top: 5px solid #5FD0C0;    border-left: 5px solid #5FD0C0;  border-radius: 20px 0 0 0; }
    .vf-corner.tr { right: 10px; top: 10px;    border-top: 5px solid #5FD0C0;    border-right: 5px solid #5FD0C0; border-radius: 0 20px 0 0; }
    .vf-corner.bl { left: 10px;  bottom: 10px; border-bottom: 5px solid #5FD0C0; border-left: 5px solid #5FD0C0;  border-radius: 0 0 0 20px; }
    .vf-corner.br { right: 10px; bottom: 10px; border-bottom: 5px solid #5FD0C0; border-right: 5px solid #5FD0C0; border-radius: 0 0 20px 0; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
    #scan-hint { font-size: 15px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.5; max-width: min(88vw, 420px); }

    /* ====== 底部备选按钮 ====== */
    .scan-footer { display: flex; gap: 12px; padding: 12px 16px 20px; flex-shrink: 0; }
    .btn-fallback {
      flex: 1; min-height: 56px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.80); border-radius: 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 5px; padding: 0 10px; text-align: center; line-height: 1.4;
    }
    .btn-fallback:active { background: rgba(255,255,255,0.18); }
    .btn-fallback-warn { border-color: rgba(245,166,35,0.4); color: rgba(245,194,107,0.9); }

    /* ====== 扫码结果覆层（错码 toast）====== */
    #result-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .result-card { background: #fff; border-radius: 20px; padding: 28px 24px 24px; max-width: 340px; width: 100%; text-align: center; }
    .result-card-wrong   { background: #FFF5E6; }
    .result-card-invalid { background: #FFF0F0; }
    .result-emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .result-main  { font-size: 17px; font-weight: 700; color: #2C3E50; line-height: 1.5; margin-bottom: 8px; }
    .result-sub   { font-size: 14px; color: #6C757D; line-height: 1.5; }

    /* ====== 数字码输入弹窗 ====== */
    .code-modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .code-modal-box {
      background: #fff; border-radius: 20px;
      width: 100%; max-width: 380px;
      overflow: hidden;
      max-height: 92vh; overflow-y: auto;
    }
    /* 顶部彩色标题栏（颜色由 JS 动态设置）*/
    .code-modal-header {
      padding: 16px 20px;
      color: #fff;
    }
    .code-modal-title { font-size: 18px; font-weight: 700; }
    /* 家长模式正文说明 */
    .code-modal-body { padding: 12px 20px 0; }
    .code-modal-desc  { font-size: 15px; color: #2C3E50; line-height: 1.6; margin-bottom: 4px; }
    .code-modal-small { font-size: 13px; color: #6C757D; line-height: 1.5; }
    /* 6 格数字显示 */
    .code-digits {
      display: flex; gap: 8px; justify-content: center;
      padding: 16px 16px 4px;
    }
    .digit-box {
      flex: 1; min-width: 36px; max-width: 52px; height: 58px;
      border: 2px solid #D0D5DD; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #2C3E50;
      transition: border-color 0.15s, background 0.15s;
    }
    /* 验证错误提示 */
    .code-error {
      font-size: 14px; font-weight: 600; color: #E57373;
      text-align: center; padding: 6px 16px 0; min-height: 24px;
    }
    /* 自定义数字键盘 */
    .code-numpad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 12px 16px 8px;
    }
    .numpad-btn {
      min-height: 64px; background: #F5F6FA; border: none;
      border-radius: 12px; font-size: 26px; font-weight: 600;
      color: #2C3E50; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.1s;
    }
    .numpad-btn:active { background: #E0E4EF; transform: scale(0.94); }
    .numpad-del { font-size: 20px; background: #FFF3E0; color: #E67E22; }
    .numpad-del:active { background: #FFE0B2; }
    .numpad-placeholder { min-height: 64px; } /* 空位占位 */
    /* 弹窗底部操作按钮 */
    .code-modal-actions {
      display: flex; gap: 12px; padding: 8px 16px 20px;
    }
    .code-btn-cancel {
      flex: 1; min-height: 52px;
      background: #F0F0F0; border: none;
      border-radius: 12px; font-size: 16px; font-weight: 600;
      color: #6C757D; cursor: pointer;
    }
    .code-btn-cancel:active { background: #E0E0E0; }
    .code-btn-confirm {
      flex: 2; min-height: 52px;
      color: #fff; border: none;
      border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
      /* background 由 JS 动态设置（蓝/橙）*/
    }
    .code-btn-confirm:active  { opacity: 0.85; }
    .code-btn-confirm:disabled { opacity: 0.5; }

    /* ====== 扫码成功动画 ====== */
    .camera-wrapper.scan-success {
      box-shadow: 0 0 0 4px #27AE60, 0 0 0 8px rgba(39,174,96,0.3);
    }
    /* ⚠️ 不用 display:none，用 opacity:0 隐藏。
       Safari 已知 bug：display:none 元素直接加 animation 类会不触发动画。
       始终保持 display:flex，动画只改 opacity，可靠触发。 */
    #scan-success-overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; opacity: 0; pointer-events: none;
      align-items: center; justify-content: center;
      background: rgba(39,174,96,0.22);
      border-radius: 16px;
    }
    #scan-success-overlay.active {
      animation: scanOverlayFade 0.85s ease forwards;
    }
    .scan-success-icon {
      font-size: 96px;
      opacity: 0; /* 跟随父层，由父层动画带出来 */
    }
    #scan-success-overlay.active .scan-success-icon {
      animation: scanIconPop 0.85s ease forwards;
    }
    @keyframes scanOverlayFade {
      0%   { opacity: 0; }
      18%  { opacity: 1; }
      72%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes scanIconPop {
      0%   { opacity: 0; transform: scale(0.3); }
      20%  { opacity: 1; }
      40%  { transform: scale(1.18); }
      60%  { transform: scale(0.95); }
      80%  { transform: scale(1); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ====== 扫码成功：全屏闪光 + 星星迸发（约 0.5 秒，增加找到站点的爽感）====== */
    #scan-flash {
      position: fixed; inset: 0; z-index: 500; pointer-events: none;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(232,180,60,0.35) 45%, rgba(232,180,60,0) 75%);
      opacity: 0;
    }
    #scan-flash.active { animation: scanFlashFade 0.5s ease-out forwards; }
    @keyframes scanFlashFade {
      0%   { opacity: 0; }
      12%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .scan-sparkle {
      position: fixed; z-index: 501; pointer-events: none;
      font-size: 26px; opacity: 0;
      animation: scanSparkleBurst 0.6s ease-out forwards;
    }
    @keyframes scanSparkleBurst {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.4); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: var(--sparkle-end) scale(1); }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <!-- 扫码成功全屏闪光（默认透明不挡交互，动画时短暂出现）-->
  <div id="scan-flash"></div>

  <!-- 顶部导航 -->
  <header class="scan-header">
    <button id="btn-back">← 返回</button>
    <span class="scan-title">对准二维码</span>
    <span id="station-label">…</span>
  </header>

  <!-- 摄像头主区域 -->
  <div class="scan-camera-section">
    <div class="camera-wrapper">
      <div id="start-overlay">
        <div id="idle-content"
             style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%">
          <div class="start-icon">📷</div>
          <button id="btn-start-scan">点击开始扫码</button>
        </div>
        <div id="error-content">
          <div class="error-icon">⚠️</div>
          <p class="error-text" id="error-msg"></p>
          <button id="btn-retry-scan">再试一次</button>
        </div>
      </div>
      <div id="reader"></div>
      <!-- 方案A 取景框四角（纯装饰）-->
      <div class="vf-corner tl"></div>
      <div class="vf-corner tr"></div>
      <div class="vf-corner bl"></div>
      <div class="vf-corner br"></div>
      <!-- 扫码成功绿色遮罩 + ✅ 动画 -->
      <div id="scan-success-overlay">
        <span class="scan-success-icon">✅</span>
      </div>
    </div>
    <p id="scan-hint">把二维码放进框里就行啦～</p>
  </div>

  <!-- 底部备选按钮 -->
  <div class="scan-footer">
    <button class="btn-fallback" id="btn-manual-input">⌨️ 扫不出？<br>可以输入数字码</button>
    <button class="btn-fallback btn-fallback-warn" id="btn-cant-find">❓ 找不到<br>二维码？</button>
  </div>

  <!-- 扫码结果覆层（错码 toast，2 秒自动消失）-->
  <div id="result-overlay" style="display:none">
    <div id="result-card" class="result-card">
      <span id="result-emoji" class="result-emoji"></span>
      <p id="result-main" class="result-main"></p>
      <p id="result-sub" class="result-sub"></p>
    </div>
  </div>

  <!-- ====== 数字码输入弹窗（孩子语境 / 家长语境共用）====== -->
  <div id="code-modal" class="code-modal-overlay" style="display:none">
    <div class="code-modal-box">

      <!-- 彩色标题栏（颜色由 JS 设置）-->
      <div class="code-modal-header" id="code-modal-header">
        <p class="code-modal-title" id="code-modal-title"></p>
      </div>

      <!-- 家长模式的说明文字（默认隐藏）-->
      <div class="code-modal-body" id="code-modal-body" style="display:none">
        <p class="code-modal-desc">二维码找不到了？请爸爸妈妈输入这一站的 6 位数字码</p>
        <p class="code-modal-small">在打印的应急小抄、或电脑端 L1 详情页可以查到</p>
      </div>

      <!-- 6 格数字显示 -->
      <div class="code-digits">
        <div class="digit-box" id="d0"></div>
        <div class="digit-box" id="d1"></div>
        <div class="digit-box" id="d2"></div>
        <div class="digit-box" id="d3"></div>
        <div class="digit-box" id="d4"></div>
        <div class="digit-box" id="d5"></div>
      </div>

      <!-- 验证错误提示（默认隐藏）-->
      <p class="code-error" id="code-error" style="visibility:hidden"> </p>

      <!-- 自定义数字键盘 -->
      <div class="code-numpad">
        <button class="numpad-btn" data-n="1">1</button>
        <button class="numpad-btn" data-n="2">2</button>
        <button class="numpad-btn" data-n="3">3</button>
        <button class="numpad-btn" data-n="4">4</button>
        <button class="numpad-btn" data-n="5">5</button>
        <button class="numpad-btn" data-n="6">6</button>
        <button class="numpad-btn" data-n="7">7</button>
        <button class="numpad-btn" data-n="8">8</button>
        <button class="numpad-btn" data-n="9">9</button>
        <button class="numpad-btn numpad-del" data-n="del">⌫</button>
        <button class="numpad-btn" data-n="0">0</button>
        <div class="numpad-placeholder"></div>
      </div>

      <!-- 底部取消 / 确定 -->
      <div class="code-modal-actions">
        <button class="code-btn-cancel" id="code-cancel">取消</button>
        <button class="code-btn-confirm" id="code-confirm">确定</button>
      </div>

    </div>
  </div>

  <!-- Eruda 调试 -->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <script type="module">
    import db from '../../shared/db/play-db.js';
    import { resolveCode, goToChallenge } from '../scripts/scan-verify.js';

    // ── 初始化 ──────────────────────────────────────────────────────
    const params    = new URLSearchParams(location.search);
    const sessionId = params.get('sessionId');
    if (!sessionId) { location.href = 'select-level.html'; }

    let html5Qr    = null;
    let isScanning  = false;
    let isVerifying = false; // 扫码验证中（防重复触发）

    // ding 音效预加载（统一管理 + iOS 解锁）
    const dingSound = new Audio('../assets/sounds/ding.mp3');

    // ── 加载站点编号 ──
    async function loadStation() {
      const session = await db.sessions.get(sessionId);
      if (!session) { location.href = 'select-level.html'; return; }
      document.getElementById('station-label').textContent =
        `第 ${session.currentPointIndex + 1} 站`;
    }

    // ── 扫码页面状态管理 ──

    function showIdleState() {
      document.getElementById('idle-content').style.display  = 'flex';
      document.getElementById('error-content').style.display = 'none';
      document.getElementById('start-overlay').style.display = 'flex';
      document.getElementById('btn-start-scan').disabled = false;
      document.getElementById('scan-hint').textContent = '把二维码放进框里就行啦～';
      document.getElementById('scan-hint').style.color = '';
    }

    function showCameraError(msg) {
      document.getElementById('idle-content').style.display  = 'none';
      document.getElementById('error-content').style.display = 'flex';
      document.getElementById('error-msg').innerHTML = msg;
      document.getElementById('start-overlay').style.display = 'flex';
    }

    async function startScan() {
      if (isScanning || isVerifying) return;
      document.getElementById('reader').innerHTML = '';
      html5Qr = new Html5Qrcode('reader');
      document.getElementById('start-overlay').style.display = 'none';
      try {
        await html5Qr.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 260, height: 260 } },
          handleScanResult,
          () => {}
        );
        isScanning = true;
      } catch (err) {
        console.error('[扫码] 摄像头启动失败', err);
        showCameraError(
          '摄像头启动失败<br>' +
          '请在 iPad「设置 → Safari → 相机」选「允许」<br><br>' +
          '也可以点下方「输入数字码」'
        );
      }
    }

    async function stopCamera() {
      if (!isScanning || !html5Qr) return;
      try { await html5Qr.stop(); } catch (e) {
        console.warn('[扫码] 停止摄像头时出错', e);
      }
      isScanning = false;
    }

    // ── 扫到 QR 码的处理 ──
    async function handleScanResult(decodedText) {
      if (isVerifying) return;
      isVerifying = true;
      await stopCamera();
      const code = decodedText.trim();
      console.log('[扫码] 识别内容：', code);
      try {
        const res = await resolveCode(code, sessionId);
        if (res.status === 'correct') {
          dingSound.currentTime = 0;
          dingSound.play().catch(() => {});
          showScanSuccess();
          setTimeout(() => goToChallenge(sessionId), 850);
          return; // 导航中，不走 finally
        } else if (res.status === 'wrong-point') {
          showResultCard('wrong',
            '这不是你现在要找的点哦！',
            `现在要找第 ${res.currentStationNumber} 站，再看看提示～`
          );
        } else {
          showResultCard('invalid',
            '这不是寻宝游戏的码哦',
            '可能是别的二维码不小心扫到了～'
          );
        }
      } catch (err) {
        console.error('[扫码] 验证失败', err);
        showResultCard('invalid', '验证时出错了', '请重试一次');
      } finally {
        isVerifying = false;
      }
    }

    // 扫码错误 toast：2 秒后自动回到 idle
    function showResultCard(type, main, sub) {
      document.getElementById('result-emoji').textContent = type === 'wrong' ? '🤔' : '❓';
      document.getElementById('result-main').textContent  = main;
      document.getElementById('result-sub').textContent   = sub;
      document.getElementById('result-card').className =
        type === 'wrong' ? 'result-card result-card-wrong' : 'result-card result-card-invalid';
      document.getElementById('result-overlay').style.display = 'flex';
      setTimeout(() => {
        document.getElementById('result-overlay').style.display = 'none';
        showIdleState();
      }, 2000);
    }

    // 扫码成功动画：取景框绿光 + ✅ 弹出淡出（约 0.85 秒）
    // 用 rAF 确保浏览器先完成一帧布局再加动画类，防止 Safari 吞动画
    function showScanSuccess() {
      // 手动输码路径没启动过摄像头，idle 的「点击开始扫码」还显示着，
      // 绿色成功遮罩是半透明的会透出它 → 这里先把 start-overlay 藏掉
      document.getElementById('start-overlay').style.display = 'none';
      const wrapper = document.querySelector('.camera-wrapper');
      wrapper.classList.add('scan-success');
      const overlay = document.getElementById('scan-success-overlay');
      requestAnimationFrame(() => {
        overlay.classList.add('active');
      });
      launchScanSparkle();
    }

    // 全屏闪光 + 一小把星星从中心迸发（约 0.5-0.6 秒，纯 CSS，自动清理）
    function launchScanSparkle() {
      const flash = document.getElementById('scan-flash');
      flash.classList.remove('active');
      void flash.offsetWidth; // 强制重排，允许连续触发动画
      flash.classList.add('active');

      const emojis = ['✨', '⭐', '🌟'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const count = 10;
      for (let i = 0; i < count; i++) {
        const angle  = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const dist   = 90 + Math.random() * 70;
        const dx     = Math.cos(angle) * dist;
        const dy     = Math.sin(angle) * dist;
        const el = document.createElement('span');
        el.className   = 'scan-sparkle';
        el.textContent = emojis[i % emojis.length];
        el.style.left  = `${cx}px`;
        el.style.top   = `${cy}px`;
        el.style.setProperty('--sparkle-end', `translate(${dx}px, ${dy}px)`);
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 650);
      }
    }

    // ── 扫码页按钮 ──
    document.getElementById('btn-back').addEventListener('click', async () => {
      await stopCamera();
      location.href = `hint.html?sessionId=${encodeURIComponent(sessionId)}`;
    });
    document.getElementById('btn-start-scan').addEventListener('click', () => {
      // iOS 音频解锁：必须在用户手势内预触发，否则 handleScanResult 里无法自动播放
      dingSound.muted = true;
      dingSound.play().then(() => { dingSound.pause(); dingSound.currentTime = 0; dingSound.muted = false; }).catch(() => {});
      startScan();
    });
    document.getElementById('btn-retry-scan').addEventListener('click', () => {
      showIdleState();
      startScan();
    });
    // 底部两个按钮：停摄像头 → 打开对应弹窗
    document.getElementById('btn-manual-input').addEventListener('click', async () => {
      // iOS 音频解锁：submitCode 里的播放不在手势内，需在这里提前解锁
      dingSound.muted = true;
      dingSound.play().then(() => { dingSound.pause(); dingSound.currentTime = 0; dingSound.muted = false; }).catch(() => {});
      await stopCamera();
      openCodeModal('child');
    });
    document.getElementById('btn-cant-find').addEventListener('click', async () => {
      // iOS 音频解锁（与 btn-manual-input 相同）
      dingSound.muted = true;
      dingSound.play().then(() => { dingSound.pause(); dingSound.currentTime = 0; dingSound.muted = false; }).catch(() => {});
      await stopCamera();
      openCodeModal('parent');
    });

    // 切后台：停摄像头；回前台：恢复 idle（不自动重启，防 iPad 黑屏）
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'hidden') {
        await stopCamera();
      } else if (!isScanning && !isVerifying) {
        showIdleState();
      }
    });

    // ── 数字码输入弹窗 ─────────────────────────────────────────────

    // 弹窗颜色主题（子/家长模式）
    const MODAL_COLOR = { child: '#E28638', parent: '#E8A33D' };
    const ERROR_TEXT  = {
      child:  '码不对哦，再看看二维码下面的数字',
      parent: '家长再仔细看下数字',
    };

    let currentMode   = 'child'; // 当前弹窗模式
    let currentInput  = '';      // 已输入的数字（最多 6 位）
    let isSubmitting  = false;   // 防止重复提交

    function openCodeModal(mode) {
      currentMode  = mode;
      currentInput = '';
      isSubmitting = false;
      const color = MODAL_COLOR[mode];

      // 配置标题栏颜色 + 标题文字
      document.getElementById('code-modal-header').style.background = color;
      document.getElementById('code-modal-title').textContent =
        mode === 'parent' ? '请家长输入' : '输入这一站的 6 位数字码';

      // 家长模式才显示说明文字
      document.getElementById('code-modal-body').style.display =
        mode === 'parent' ? 'block' : 'none';

      // 确定按钮颜色
      document.getElementById('code-confirm').style.background = color;
      document.getElementById('code-confirm').disabled = false;
      document.getElementById('code-confirm').textContent = '确定';

      // 清空错误 + 重置输入框
      document.getElementById('code-error').style.visibility = 'hidden';
      updateDigitDisplay();

      document.getElementById('code-modal').style.display = 'flex';
    }

    // 更新 6 格数字显示 + 激活框高亮
    function updateDigitDisplay() {
      const color = MODAL_COLOR[currentMode];
      for (let i = 0; i < 6; i++) {
        const box = document.getElementById(`d${i}`);
        box.textContent = currentInput[i] || '';
        if (i === currentInput.length) {
          // 当前将要输入的格：高亮
          box.style.borderColor = color;
          box.style.background  = currentMode === 'parent' ? '#FFF8EE' : '#F0F7FF';
        } else if (currentInput[i]) {
          // 已填入的格
          box.style.borderColor = '#7BB0EE';
          box.style.background  = '';
        } else {
          // 未填的格
          box.style.borderColor = '#D0D5DD';
          box.style.background  = '';
        }
      }
    }

    // 处理键盘按钮
    function handleNumpadInput(n) {
      if (n === 'del') {
        currentInput = currentInput.slice(0, -1);
        // 删除时隐藏错误
        document.getElementById('code-error').style.visibility = 'hidden';
        updateDigitDisplay();
        return;
      }
      if (currentInput.length >= 6) return;
      // 首次输入时清除错误
      document.getElementById('code-error').style.visibility = 'hidden';
      currentInput += n;
      updateDigitDisplay();
      // 6 位输满：300ms 后自动提交（给用户看清最后一位）
      if (currentInput.length === 6) {
        setTimeout(submitCode, 300);
      }
    }

    // 提交验证
    async function submitCode() {
      if (currentInput.length < 6 || isSubmitting) return;
      isSubmitting = true;

      const confirmBtn = document.getElementById('code-confirm');
      confirmBtn.disabled = true;
      confirmBtn.textContent = '⏳';

      try {
        const res = await resolveCode(currentInput, sessionId);

        if (res.status === 'correct') {
          // 正确：关弹窗 → 音效 → 动画 → 跳转（与扫码路径行为一致）
          document.getElementById('code-modal').style.display = 'none';
          dingSound.currentTime = 0;
          dingSound.play().catch(() => {});
          showScanSuccess();
          setTimeout(() => goToChallenge(sessionId), 850);
          return; // 不走 finally（页面正在跳转）

        } else {
          // 不对：停在弹窗 + 显示提示 + 清空重输
          const errEl = document.getElementById('code-error');
          errEl.textContent = ERROR_TEXT[currentMode];
          errEl.style.visibility = 'visible';
          currentInput = '';
          updateDigitDisplay();
        }

      } catch (err) {
        console.error('[数字码] 验证失败', err);
        const errEl = document.getElementById('code-error');
        errEl.textContent = '验证出错，请重试';
        errEl.style.visibility = 'visible';
        currentInput = '';
        updateDigitDisplay();
      } finally {
        isSubmitting = false;
        confirmBtn.disabled = false;
        confirmBtn.textContent = '确定';
      }
    }

    // 键盘点击
    document.querySelector('.code-numpad').addEventListener('click', e => {
      const btn = e.target.closest('[data-n]');
      if (btn) handleNumpadInput(btn.dataset.n);
    });

    // 确定按钮（手动确认，也可用于 < 6 位时无操作）
    document.getElementById('code-confirm').addEventListener('click', submitCode);

    // 取消：关弹窗，回扫码 idle 状态
    document.getElementById('code-cancel').addEventListener('click', () => {
      document.getElementById('code-modal').style.display = 'none';
      showIdleState();
    });

    // ── 初始化 ──
    loadStation().catch(err => console.error('[扫码] 加载站点信息失败', err));
  </script>

</body>
</html>
