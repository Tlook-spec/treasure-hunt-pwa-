<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F4EAD5">
  <link rel="manifest" href="manifest.json">
  <!-- iOS PWA 专属 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="寻宝游戏">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <title>寻宝游戏</title>
  <!-- CDN 库（普通 script，先加载以便 SW 缓存；启动页本身不调用这些库）-->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <!-- html5-qrcode：扫码页用，这里预加载让 SW 提前缓存，保证离线可用 -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- pinyin-pro：拼音标注，quiz.html 用，这里预加载让 SW 提前缓存 -->
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.2/dist/index.js"></script>

  <style>
    /* 变量从 main.css 复制，避免启动页依赖外部 CSS 文件（减少首屏等待） */
    :root {
      --color-primary: #E0772F;
      --color-primary-dark: #C2651F;
      --color-accent: #E8B43C;
      --color-bg-game: #F4EAD5;
      --color-text: #52402D;
      --color-text-muted: #82664B;
      --radius-btn: 12px;
      --shadow-float: 0 4px 12px rgba(0,0,0,0.15);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-bg-game);
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      color: var(--color-text);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
    }

    /* ====== 主内容区（居中）====== */
    .launch-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px 24px;
      gap: 20px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* ====== Logo 方块（蓝色圆角，地图 emoji 居中）====== */
    .logo-box {
      width: 120px;
      height: 120px;
      background: var(--color-primary);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      line-height: 1;
      box-shadow: var(--shadow-float);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ====== 文字区 ====== */
    .launch-title {
      font-size: 36px;
      font-weight: 900;
      color: var(--color-text);
      letter-spacing: 4px;
      text-align: center;
    }

    .launch-subtitle {
      font-size: 16px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.5;
      margin-top: -8px;
    }

    /* ====== 开始游戏按钮 ====== */
    .btn-start {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 72px;
      background: var(--color-primary);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius-btn);
      font-size: 22px;
      font-weight: 800;
      box-shadow: var(--shadow-float);
      transition: transform 0.12s ease, background 0.12s ease;
      margin-top: 12px;
    }
    .btn-start:active {
      transform: scale(0.96);
      background: var(--color-primary-dark);
    }

    /* ====== 底部设置入口（右下角，不显眼）====== */
    .settings-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: var(--color-text-muted);
      font-size: 14px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .settings-link:active { opacity: 0.7; }

    /* ====== 横屏小屏适配 ====== */
    @media (orientation: landscape) and (max-height: 480px) {
      .logo-box { width: 72px; height: 72px; font-size: 40px; animation: none; }
      .launch-title { font-size: 28px; letter-spacing: 2px; }
      .launch-body { gap: 12px; padding: 16px 32px 16px; }
      .btn-start { min-height: 56px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- 启动页主体 -->
  <div class="launch-body">
    <div class="logo-box">🗺️</div>
    <h1 class="launch-title">寻宝游戏</h1>
    <p class="launch-subtitle">和小伙伴一起去探险吧！</p>
    <a href="pages/select-level.html" class="btn-start">🎮 开始游戏</a>
    <!-- 离线准备提示：SW 未就绪时显示，就绪后隐藏；不打扰正常用户 -->
    <div id="offline-tip" style="
      display: none;
      margin-top: 10px;
      padding: 10px 16px;
      background: rgba(245,166,35,0.13);
      border: 1px solid rgba(245,166,35,0.5);
      border-radius: 12px;
      font-size: 14px;
      color: #7A5A00;
      line-height: 1.6;
      text-align: center;
      max-width: 320px;
    "></div>
  </div>

  <!-- 右下角设置入口（不显眼）-->
  <a href="pages/settings.html" class="settings-link">⚙️ 设置</a>

  <!-- Eruda 调试（仅 ?debug=1 时加载）-->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- 注册 Service Worker + 检查离线准备状态 -->
  <script>
    // 检查 SW 缓存进度并按需显示提示
    async function checkAndShowTip() {
      const tip = document.getElementById('offline-tip');
      if (!tip) return;

      // 没有 controller：首次打开或刚更新版本，需联网缓存一次
      if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
        tip.textContent = '⚠️ 第一次使用请先联网打开一遍，确保离线资源已下载，之后即可飞行模式游玩';
        tip.style.display = 'block';
        return;
      }

      // 有 controller：向 SW 查询缓存完成情况
      try {
        const status = await new Promise((resolve, reject) => {
          const mc = new MessageChannel();
          mc.port1.onmessage = (e) => resolve(e.data);
          setTimeout(() => reject(new Error('超时')), 4000);
          navigator.serviceWorker.controller.postMessage({ type: 'CHECK_CACHE' }, [mc.port2]);
        });

        if (!status.ready) {
          tip.textContent = `⚠️ 离线资源下载中（${status.cached}/${status.total}），请保持联网，下载完成后可飞行模式游玩`;
          tip.style.display = 'block';
        }
        // ready → 提示保持隐藏，不打扰正常玩家
      } catch (e) {
        // 超时或异常 → 静默不显示
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(r => console.log('[SW] 注册成功，范围：', r.scope))
          .catch(e => console.error('[SW] 注册失败：', e));
        // 注册后检查离线就绪状态（首次访问 controller 为 null，直接提示；已就绪则静默）
        checkAndShowTip();
      });
    }
  </script>

</body>
</html>
