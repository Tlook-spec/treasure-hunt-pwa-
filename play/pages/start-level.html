<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90E2">
  <link rel="stylesheet" href="../styles/main.css">
  <title>开始冒险 - 寻宝游戏</title>
  <style>
    /* 开场故事文字区（给孩子读的：字大、留白足、保留换行）*/
    .story-section {
      padding: 32px 16px;
      display: flex;
      justify-content: center;
    }
    .story-text {
      font-size: 20px;
      line-height: 1.9;
      color: var(--color-text, #1a1a2e);
      white-space: pre-wrap;   /* 保留家长填写的换行符 */
      text-align: center;
      max-width: 560px;
    }
  </style>
  <!-- CDN 库（普通 script，必须在 type="module" 之前）-->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
</head>
<body>

  <!-- 顶部返回栏 -->
  <header class="page-header">
    <a href="select-level.html" class="btn-back">← 返回</a>
  </header>

  <!-- 主内容 -->
  <main class="page-content has-bottom-action">
    <!-- 探险概览（默认显示；有故事时点「开始冒险」后隐藏，切到故事视图）-->
    <div class="level-overview" id="level-overview">
      <!-- 探险图标（JS 根据 ID 哈希选 emoji，保证同一探险图标稳定）-->
      <div class="level-overview-icon" id="level-icon">🗺️</div>
      <h1 class="level-overview-name" id="level-name">加载中…</h1>
      <!-- 探险简介卡片 -->
      <div class="level-overview-desc" id="level-desc"></div>
    </div>

    <!-- 开场故事（openingStory 非空时，点「开始冒险」后显示；默认隐藏）-->
    <div id="story-section" class="story-section" style="display:none">
      <p id="story-text" class="story-text"></p>
    </div>
    <!-- 地图全览（有 mapImage 时，故事显示后同步展示；所有点位都未发现，只显示底图）-->
    <div id="story-map-container"
         style="display:none; margin:0 16px 16px; border-radius:12px; overflow:hidden;
                background:transparent; position:relative;"></div>
  </main>

  <!-- 底部固定：开始按钮（加载完成前禁用）-->
  <div class="bottom-action">
    <button class="btn-primary" id="btn-start" disabled>⏳ 加载中…</button>
  </div>

  <!-- Eruda 调试 -->
  <script>
    if (new URLSearchParams(location.search).get('debug') === '1') {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js';
      s.onload = () => eruda.init();
      document.head.appendChild(s);
    }
  </script>

  <!-- ES Module：加载探险信息 + 创建 GameSession 并跳转 -->
  <script type="module">
    import db from '../../shared/db/play-db.js';
    import { generateId } from '../../shared/utils/id.js';
    import { renderMapOverlay, injectMapAnimStyles } from '../scripts/map-overlay.js?v=V1-17';

    // 轮换图标，同一探险 ID 永远映射到同一个图标
    const ICONS = ['🗺️', '🌲', '🔍', '🏆', '⭐', '🎯', '🧩', '🏃'];
    function pickIcon(id) {
      let hash = 0;
      for (const ch of String(id)) hash = (hash * 31 + ch.charCodeAt(0)) & 0xFFFFFFFF;
      return ICONS[Math.abs(hash) % ICONS.length];
    }

    // 从 URL 获取 levelId
    const levelId = new URLSearchParams(location.search).get('levelId');
    if (!levelId) {
      location.href = 'select-level.html';
    }

    // 开场故事文本（模块级，供 init 赋值、点击事件读取）
    let levelOpeningStory = '';
    // 是否已经切换到故事视图（防止二次点击再切一次）
    let storyShown = false;
    // 地图渲染用（地图全览：开场故事显示后同步展示）
    let levelData  = null;  // 完整 Level 对象
    let allPoints  = [];    // 本探险所有点位

    async function init() {
      const level = await db.levels.get(levelId);
      if (!level) {
        // 找不到探险（可能被删除了），退回选择页
        location.href = 'select-level.html';
        return;
      }

      // 保存 level 对象和全部点位，供故事页地图渲染使用
      levelData         = level;
      levelOpeningStory = level.openingStory || '';
      allPoints = await db.points.where('levelId').equals(levelId).sortBy('order');

      // 渲染探险信息
      document.getElementById('level-icon').textContent = pickIcon(level.id);
      document.getElementById('level-name').textContent = level.name;

      const descEl = document.getElementById('level-desc');
      if (level.description) {
        descEl.textContent = level.description;
      } else {
        descEl.innerHTML = '<span class="level-overview-desc-empty">（暂无简介）</span>';
      }

      // 激活开始按钮
      const btn = document.getElementById('btn-start');
      btn.textContent = '🚀 开始冒险！';
      btn.disabled = false;
    }

    // 点击「开始冒险！」：
    //   第一阶段（有开场故事）→ 切换到故事视图
    //   第二阶段（或无故事）  → 创建 GameSession，跳转到提示页
    document.getElementById('btn-start').addEventListener('click', async () => {
      const btn = document.getElementById('btn-start');

      // ── 第一阶段：有开场故事且还没显示过 ──
      if (levelOpeningStory && !storyShown) {
        document.getElementById('level-overview').style.display = 'none';
        document.getElementById('story-text').textContent = levelOpeningStory;
        document.getElementById('story-section').style.display = 'block';

        // 如果有地图底图，在故事下方显示地图全览（所有点位均未发现，只展示底图）
        if (levelData && levelData.mapImage) {
          injectMapAnimStyles();
          const storyMapEl = document.getElementById('story-map-container');
          renderMapOverlay(storyMapEl, levelData, allPoints, {}, { naturalHeight: true });
          storyMapEl.style.display = 'block';
        }

        btn.textContent = '🚀 开始冒险！';
        storyShown = true;
        return; // 等待孩子读完故事再点一次
      }

      // ── 第二阶段：无故事 或 故事已显示，创建 session 并跳转 ──
      btn.disabled = true;
      btn.textContent = '⏳ 出发中…';

      try {
        const session = {
          id:                   generateId('sn'),
          levelId,
          startedAt:            Date.now(),
          endedAt:              null,
          status:               'in_progress',
          currentPointIndex:    0,
          currentQuestionIndex: 0,
          helpUsedCount:        0,
          maxHelpCount:         3,
          pointRecords:         [],
        };
        await db.sessions.add(session);
        // 用 sessionId 跳转，session 是游戏进度的唯一数据源
        location.href = `hint.html?sessionId=${encodeURIComponent(session.id)}`;
      } catch (err) {
        console.error('[开始冒险] 创建会话失败', err);
        btn.disabled = false;
        btn.textContent = '🚀 开始冒险！';
        alert('出错了，请刷新页面重试\n\n' + err.message);
      }
    });

    init().catch(err => {
      console.error('[开始冒险] 页面初始化失败', err);
    });
  </script>

</body>
</html>
