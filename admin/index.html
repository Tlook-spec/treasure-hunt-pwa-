<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寻宝游戏 - 编辑端</title>
  <link rel="stylesheet" href="styles/main.css">

  <!-- CDN 库：普通 <script>，必须在 type="module" 之前 -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@2.0.4/dist/qrcode.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<!-- 顶部 Header -->
<header class="header">
  <button class="hamburger" id="hamburger-btn" aria-label="打开菜单">☰</button>
  <span class="header-logo">🗺️</span>
  <span class="header-title">寻宝游戏 - 编辑端</span>
</header>

<!-- 整体布局 -->
<div class="layout">

  <!-- 移动端遮罩 -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- 左侧导航 -->
  <nav class="sidebar" id="sidebar">
    <ul class="nav-list">
      <li class="nav-item">
        <a href="#/levels">
          <span class="nav-icon">📝</span>
          探险管理
        </a>
      </li>
      <li class="nav-item">
        <a href="#/questions">
          <span class="nav-icon">📚</span>
          题库管理
        </a>
      </li>
      <li class="nav-item">
        <a href="#/import-export">
          <span class="nav-icon">🔄</span>
          导入导出
        </a>
      </li>
    </ul>
  </nav>

  <!-- 主内容区：由 router.js 动态填充 -->
  <main class="main-content" id="main-content">
    <div class="placeholder-page">
      <div class="placeholder-icon">⏳</div>
      <p>初始化中...</p>
    </div>
  </main>

</div>

<!-- 我们自己的模块代码：放在 CDN <script> 之后 -->
<script type="module">
  import { initRouter } from './scripts/router.js';
  initRouter();
</script>

</body>
</html>
